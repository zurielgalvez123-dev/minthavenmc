<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MintHaven MC | Store</title>
<meta name="description" content="MintHaven MC official store — ranks, crate keys and coins. Support the server, get perks in game.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#101514;
  --bg2:#151b1a;
  --panel:#1a2220;
  --panel2:#1f2926;
  --line:#2a3833;
  --mint:#4ade9b;
  --mint-dark:#2fae74;
  --mint-dim:#8fd9ba;
  --text:#e8f2ec;
  --muted:#9db3a9;
  --gold:#f5c04e;
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg)}
body{
  font-family:'Nunito',sans-serif;
  font-size:15px;
  color:var(--text);
  background:
    radial-gradient(1200px 500px at 50% -100px, rgba(74,222,155,.07), transparent 60%),
    var(--bg);
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none}
.px{font-family:'Press Start 2P',monospace;letter-spacing:0}
img,svg{display:block}

/* ---------- top bar ---------- */
.topbar{
  background:rgba(13,17,16,.92);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(6px);
}
.topbar-inner{
  max-width:1120px;margin:0 auto;padding:0 16px;
  height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.ip-chip{
  display:flex;align-items:center;gap:10px;
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:8px 14px;color:var(--mint);
  font-size:13px;font-weight:800;letter-spacing:.6px;
  transition:border-color .15s, transform .1s;
}
.ip-chip:hover{border-color:var(--mint-dark)}
.ip-chip:active{transform:scale(.98)}
.ip-chip .hint{color:var(--muted);font-weight:600;letter-spacing:0;text-transform:none}
.top-right{display:flex;align-items:center;gap:10px}
.top-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:8px 14px;font-size:13px;font-weight:700;color:var(--text);
  transition:border-color .15s;
}
.top-btn:hover{border-color:var(--mint-dark)}

/* ---------- layout ---------- */
.wrap{
  max-width:1120px;margin:24px auto 48px;padding:0 16px;
  display:grid;grid-template-columns:280px 1fr;gap:24px;
  align-items:start;
}

/* ---------- sidebar ---------- */
.side{display:flex;flex-direction:column;gap:16px;position:sticky;top:80px}
.logo-card{
  background:linear-gradient(180deg, var(--panel2), var(--panel));
  border:1px solid var(--line);border-radius:var(--radius);
  padding:26px 16px 20px;text-align:center;
  position:relative;overflow:hidden;
}
.logo-card::before{
  content:"";position:absolute;inset:0;
  background:
    linear-gradient(transparent 0 92%, rgba(74,222,155,.08) 92%),
    radial-gradient(300px 120px at 50% -30px, rgba(74,222,155,.14), transparent 70%);
  pointer-events:none;
}
.logo-card svg{margin:0 auto 14px;image-rendering:pixelated}
.logo-name{font-size:14px;color:var(--mint)}
.logo-sub{font-size:13px;color:var(--muted);margin-top:8px;font-weight:600}
.nav-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.nav-item{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  padding:14px 16px;background:none;color:var(--text);
  font-size:14px;font-weight:700;
  border-left:3px solid transparent;
  border-bottom:1px solid var(--line);
  transition:background .12s,border-color .12s;
}
.nav-item:last-child{border-bottom:none}
.nav-item:hover{background:var(--panel2)}
.nav-item.active{border-left-color:var(--mint);background:var(--panel2);color:var(--mint)}
.nav-item .ico{width:22px;height:22px;flex:none;image-rendering:pixelated}
.side-note{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;text-align:center;
}
.side-note .t{font-size:13px;color:var(--gold);margin-bottom:10px}
.side-note p{font-size:13px;color:var(--muted);font-weight:600;line-height:1.5}
.side-note a{color:var(--mint);font-weight:700}

/* ---------- main ---------- */
.main{display:flex;flex-direction:column;gap:20px;min-width:0}
.welcome{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.welcome .wt{font-size:13px;color:var(--mint)}
.welcome .ws{font-size:13px;color:var(--muted);font-weight:600;margin-top:6px}
.banner{
  border-radius:var(--radius);border:1px solid var(--line);
  background:
    linear-gradient(115deg, rgba(16,21,20,.15) 40%, rgba(16,21,20,.55)),
    repeating-linear-gradient(90deg, #2fae74 0 24px, #35bd80 24px 48px, #2fae74 48px 72px, #28a06a 72px 96px),
    var(--mint-dark);
  min-height:150px;position:relative;overflow:hidden;
  display:flex;align-items:flex-end;
}
.banner::before{
  content:"";position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg, transparent 0 22px, rgba(0,0,0,.06) 22px 24px),
    repeating-linear-gradient(90deg, transparent 0 22px, rgba(0,0,0,.06) 22px 24px);
}
.banner-label{
  position:relative;margin:16px;padding:10px 14px;border-radius:8px;
  background:rgba(13,17,16,.82);border:1px solid rgba(74,222,155,.35);
  font-size:13px;color:var(--text);
}
.card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px;
}
.card h2{font-size:14px;color:var(--mint);margin-bottom:14px}
.card p{font-size:15px;line-height:1.65;color:var(--muted);font-weight:600}
.card p + p{margin-top:12px}
.card p strong{color:var(--text)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  border-radius:8px;padding:11px 18px;
  font-size:14px;font-weight:800;
  transition:transform .1s, filter .15s;
}
.btn:active{transform:scale(.97)}
.btn-mint{background:var(--mint);color:#0c1410;box-shadow:0 4px 0 var(--mint-dark)}
.btn-mint:hover{filter:brightness(1.06)}
.btn-ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--mint-dark)}

/* ---------- category grid ---------- */
.cat-head{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 20px;font-size:13px;color:var(--text);
}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.prod{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 16px 18px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:transform .15s, border-color .15s;
}
.prod:hover{transform:translateY(-3px);border-color:var(--mint-dark)}
.prod .art{width:88px;height:88px;image-rendering:pixelated;margin-bottom:8px}
.prod .name{font-size:15px;font-weight:800;color:var(--text)}
.prod .price{font-size:14px;font-weight:800;color:var(--mint-dim);margin-bottom:10px}
.prod .buy{
  width:100%;max-width:150px;
  background:var(--mint);color:#0c1410;border-radius:8px;
  padding:10px 0;font-size:14px;font-weight:800;
  box-shadow:0 3px 0 var(--mint-dark);
  transition:filter .15s, transform .1s;
}
.prod .buy:hover{filter:brightness(1.06)}
.prod .buy:active{transform:scale(.97)}

/* ---------- footer ---------- */
footer{border-top:1px solid var(--line);background:var(--bg2)}
.foot-inner{
  max-width:1120px;margin:0 auto;padding:26px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.foot-inner .fb{font-size:13px;color:var(--muted);font-weight:600;line-height:1.6}
.foot-inner .px{font-size:13px;color:var(--text)}

/* ---------- modal ---------- */
.modal-bg{
  position:fixed;inset:0;background:rgba(8,11,10,.7);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);
  max-width:420px;width:100%;padding:26px;text-align:center;
}
.modal .art{width:72px;height:72px;margin:0 auto 12px;image-rendering:pixelated}
.modal h3{font-size:14px;color:var(--mint);margin-bottom:6px}
.modal .mp{font-size:15px;color:var(--muted);font-weight:600;line-height:1.6;margin:10px 0 18px}
.modal .price-line{font-size:16px;font-weight:800;color:var(--text)}
.modal .btn{justify-content:center}
.modal .btn + .btn{margin-left:8px}

/* ---------- toast ---------- */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--mint);color:#0c1410;font-weight:800;font-size:14px;
  padding:11px 20px;border-radius:8px;z-index:120;
  transition:transform .25s ease;box-shadow:0 4px 0 var(--mint-dark);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ---------- responsive ---------- */
@media(max-width:900px){
  .wrap{grid-template-columns:1fr;gap:16px}
  .side{position:static;flex-direction:column}
  .grid{grid-template-columns:repeat(2,1fr)}
  .topbar-inner{height:auto;padding:10px 12px;flex-wrap:wrap;justify-content:center}
}
@media(max-width:520px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ============ CONFIG — edit these to go live ============ -->
<script>
const CONFIG = {
  serverIp: "play.minthavenmc.com",          // TODO confirm real server IP
  discord:  "",                               // TODO paste Discord invite URL (empty = button hidden)
  contactEmail: "",                           // TODO contact email (empty = button hidden)
  // Tebex/CraftingStore checkout base URL. Empty = Buy shows "checkout opening soon" (honest, no fake links).
  checkoutUrl: ""
};

/* PLACEHOLDER CATALOG — swap names/prices/checkout ids for the real packages */
const CATALOG = {
  ranks: {
    label: "Ranks",
    blurb: "Permanent ranks. Perks apply on every season.",
    items: [
      { id:"vip",    name:"VIP",     price:9.99,  art:"helm-iron" },
      { id:"vipp",   name:"VIP+",    price:19.99, art:"helm-gold" },
      { id:"mvp",    name:"MVP",     price:34.99, art:"helm-dia" },
      { id:"mvpp",   name:"MVP+",    price:49.99, art:"helm-em" },

    ]
  },
  keys: {
    label: "Crate Keys",
    blurb: "Keys are delivered to your in-game balance instantly.",
    items: [
      { id:"key1",  name:"Mint Key ×1",     price:2.99,  art:"key" },
      { id:"key5",  name:"Mint Key ×5",     price:12.99, art:"key" },
      { id:"ekey",  name:"Emerald Key ×1",  price:4.99,  art:"key-em" },

};
</script>

<!-- ============ pixel-art sprites ============ -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <!-- mint block logo -->
    <g id="px-logo">
      <rect x="2" y="5" width="12" height="9" fill="#2fae74"/>
      <rect x="2" y="5" width="12" height="2" fill="#4ade9b"/>
      <rect x="2" y="12" width="12" height="2" fill="#1f7a52"/>
      <rect x="2" y="2" width="3" height="3" fill="#4ade9b"/>
      <rect x="6" y="1" width="3" height="4" fill="#35bd80"/>
      <rect x="10" y="2" width="3" height="3" fill="#4ade9b"/>
      <rect x="4" y="7" width="2" height="2" fill="#8fd9ba"/>
      <rect x="10" y="9" width="2" height="2" fill="#1f7a52"/>
    </g>
  </defs>
</svg>

<!-- ============ top bar ============ -->
<div class="topbar">
  <div class="topbar-inner">
    <button class="ip-chip" id="ipChip" title="Copy server IP">
      <svg width="16" height="16" viewBox="0 0 16 16"><use href="#px-logo"/></svg>
      <span id="ipText"></span>
      <span class="hint">click to copy</span>
    </button>
    <div class="top-right">
      <a class="top-btn" id="discordTop" target="_blank" rel="noopener" style="display:none">Discord</a>
      <span class="top-btn" style="cursor:default">USD $</span>
    </div>
  </div>
</div>

<!-- ============ layout ============ -->
<div class="wrap">
  <aside class="side">
    <div class="logo-card">
      <svg width="96" height="96" viewBox="0 0 16 16"><use href="#px-logo"/></svg>
      <div class="logo-name px">MINTHAVEN</div>
      <div class="logo-sub">Official Server Store</div>
    </div>

    <nav class="nav-card" id="nav"></nav>

    <div class="side-note">
      <div class="t px">Need help?</div>
      <p id="sideHelp">Questions about a purchase? Reach us on Discord and we'll sort it fast.</p>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<!-- ============ footer ============ -->
<footer>
  <div class="foot-inner">
    <div class="px">MINTHAVEN</div>
    <div class="fb">
      © <span id="year"></span> MintHaven MC. Not affiliated with Mojang Studios or Microsoft.<br>
      Payments are processed securely; packages are delivered in game.
    </div>
  </div>
</footer>

<!-- ============ buy modal ============ -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <svg class="art" viewBox="0 0 16 16" id="modalArt"></svg>
    <h3 class="px" id="modalName"></h3>
    <div class="price-line" id="modalPrice"></div>
    <p class="mp" id="modalMsg"></p>
    <div>
      <a class="btn btn-mint" id="modalGo" target="_blank" rel="noopener" style="display:none">Checkout</a>
      <button class="btn btn-ghost" id="modalClose">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Server IP copied!</div>

<script>
/* ---------- pixel sprite renderer (explicit fills — <use> shadow DOM can't be styled per instance) ---------- */
const SLOT = "#0d1211";
function helm(A,B,C){ return [
  [4,3,8,1,B],[3,4,10,3,A],[5,7,6,2,SLOT],
  [3,7,2,4,A],[11,7,2,4,A],[12,4,1,3,C],[3,10,2,1,C],[11,10,2,1,C]
];}
function key(K,L){ return [
  [4,2,4,1,K],[3,3,1,4,K],[7,3,1,4,K],[4,6,4,1,K],
  [5,7,2,6,K],[7,9,2,1,K],[7,12,2,1,K],[4,2,2,1,L]
];}
function coin(){ const G="#f5c04e",H="#ffd97a",S="#c99b2e"; return [
  [5,2,6,1,G],[4,3,8,1,G],[3,4,10,8,G],[4,12,8,1,G],[5,13,6,1,G],
  [5,3,2,2,H],[6,6,4,4,S],[7,7,2,2,G]
];}
const CROWN = [
  [3,10,10,3,"#f5c04e"],[3,5,2,5,"#f5c04e"],[7,4,2,6,"#f5c04e"],[11,5,2,5,"#f5c04e"],
  [4,11,2,1,"#4ade9b"],[7,11,2,1,"#e2554d"],[10,11,2,1,"#4a90de"],[3,10,10,1,"#ffd97a"]
];
const ART = {
  "helm-iron": helm("#c9d1cd","#eef3f0","#8f9a94"),
  "helm-gold": helm("#f5c04e","#ffd97a","#c99b2e"),
  "helm-dia":  helm("#57d4e0","#a8ecf2","#3aa8b5"),
  "helm-em":   helm("#4ade9b","#8fd9ba","#2fae74"),
  "crown":     CROWN,
  "key":       key("#8fd9ba","#d7f5e6"),
  "key-em":    key("#4ade9b","#a5ecc9"),
  "key-gold":  key("#f5c04e","#ffd97a"),
  "coin":      coin(),
  "coin-s":    coin(),
  "coin-c":    coin()
};
function artSvg(artKey, cls){
  const cells = ART[artKey] || ART["coin"];
  const rects = cells.map(([x,y,w,h,f]) => `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${f}"/>`).join("");
  return `<svg class="${cls}" viewBox="0 0 16 16" shape-rendering="crispEdges">${rects}</svg>`;
}

/* ---------- nav ---------- */
const nav = document.getElementById("nav");
const NAV_ITEMS = [["home","Store Home","#px-logo"]].concat(
  Object.entries(CATALOG).map(([k,v]) => [k, v.label, null])
);
function navIcon(key){
  if (key === "home") return `<svg class="ico" viewBox="0 0 16 16"><use href="#px-logo"/></svg>`;
  if (key === "ranks") return artSvg("helm-em","ico");
  if (key === "keys")  return artSvg("key","ico");
  if (key === "coins") return artSvg("coin","ico");
  return artSvg("coin","ico");
}
nav.innerHTML = NAV_ITEMS.map(([k,label]) =>
  `<a class="nav-item" data-page="${k}" href="#${k === "home" ? "" : k}">${navIcon(k)}${label}</a>`
).join("");

/* ---------- pages ---------- */
const main = document.getElementById("main");
function money(n){ return "$" + n.toFixed(2) + " USD"; }

function homePage(){
  const hasDiscord = !!CONFIG.discord;
  const hasMail = !!CONFIG.contactEmail;
  return `
  <div class="welcome">
    <div>
      <div class="wt px">Welcome to our store!</div>
      <div class="ws">Browse ranks, crate keys and coins — every purchase supports the server.</div>
    </div>
  </div>
  <div class="banner"><div class="banner-label px">MINTHAVEN&nbsp;MC</div></div>
  <div class="card">
    <h2 class="px">Thank you</h2>
    <p>Thank you for supporting <strong>MintHaven MC</strong>. Everything you buy here goes straight back into the server — hosting, plugins and new content.</p>
    <p><strong>Delivery:</strong> packages are applied to your account automatically. If your purchase hasn't arrived within 15 minutes, relog once — still missing? Contact us and we'll fix it.</p>
    <p><strong>Important:</strong> make sure you enter your exact Minecraft username at checkout. All purchases are final.</p>
  </div>
  ${hasDiscord || hasMail ? `<div class="card"><div class="btn-row">
      ${hasDiscord ? `<a class="btn btn-mint" href="${CONFIG.discord}" target="_blank" rel="noopener">Join our Discord</a>` : ""}
      ${hasMail ? `<a class="btn btn-ghost" href="mailto:${CONFIG.contactEmail}">Contact</a>` : ""}
  </div></div>` : ""}`;
}

function catPage(key){
  const cat = CATALOG[key];
  return `
  <div class="cat-head px">${cat.label}</div>
  <div class="card" style="padding:14px 20px"><p>${cat.blurb}</p></div>
  <div class="grid">
    ${cat.items.map(it => `
      <div class="prod">
        ${artSvg(it.art, "art")}
        <div class="name">${it.name}</div>
        <div class="price">${money(it.price)}</div>
        <button class="buy" data-cat="${key}" data-id="${it.id}">Buy</button>
      </div>`).join("")}
  </div>`;
}

function render(){
  const page = (location.hash || "#").slice(1) || "home";
  document.querySelectorAll(".nav-item").forEach(el =>
    el.classList.toggle("active", el.dataset.page === page));
  main.innerHTML = (page !== "home" && CATALOG[page]) ? catPage(page) : homePage();
  window.scrollTo({top:0});
}
window.addEventListener("hashchange", () => { modalBg.classList.remove("open"); render(); });

/* ---------- buy modal ---------- */
const modalBg = document.getElementById("modalBg");
main.addEventListener("click", e => {
  const b = e.target.closest(".buy");
  if (!b) return;
  const it = CATALOG[b.dataset.cat].items.find(x => x.id === b.dataset.id);
  document.getElementById("modalArt").outerHTML = artSvg(it.art, "art").replace('class="art"','class="art" id="modalArt"');
  document.getElementById("modalName").textContent = it.name;
  document.getElementById("modalPrice").textContent = money(it.price);
  const go = document.getElementById("modalGo");
  const msg = document.getElementById("modalMsg");
  if (CONFIG.checkoutUrl){
    go.style.display = "inline-flex";
    go.href = CONFIG.checkoutUrl;
    msg.textContent = "You'll finish this purchase on our secure checkout.";
  } else {
    go.style.display = "none";
    msg.textContent = "Online checkout is opening soon. " + (CONFIG.discord ? "Join the Discord to get notified the moment it's live." : "Check back shortly!");
  }
  modalBg.classList.add("open");
});
document.getElementById("modalClose").onclick = () => modalBg.classList.remove("open");
modalBg.addEventListener("click", e => { if (e.target === modalBg) modalBg.classList.remove("open"); });
window.addEventListener("keydown", e => { if (e.key === "Escape") modalBg.classList.remove("open"); });

/* ---------- top bar ---------- */
document.getElementById("ipText").textContent = CONFIG.serverIp.toUpperCase();
document.getElementById("ipChip").onclick = async () => {
  try { await navigator.clipboard.writeText(CONFIG.serverIp); } catch(_){}
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
};
const dTop = document.getElementById("discordTop");
if (CONFIG.discord){ dTop.style.display = "flex"; dTop.href = CONFIG.discord; }
