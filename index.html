<link rel="preload" as="image" href="assets/hero-art.jpg">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070f0c;
  --bg2:#0a1411;
  --panel:#0d1915;
  --panel-2:#122019;
  --slot:#091310;
  --line:#1d2c26;
  --line-2:#2a3f36;
  --mint:#35e0a2;
  --mint-dim:#8fd9bd;
  --mint-deep:#17835c;
  --mint-glow:rgba(53,224,162,.4);
  --text:#eaf6f0;
  --muted:#9db5aa;
  --disp:"Oswald",system-ui,sans-serif;
  --body:"Barlow",system-ui,sans-serif;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg);scroll-behavior:smooth}
body{
  font-family:var(--body);font-size:16px;color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  background:
    radial-gradient(1000px 500px at 80% -100px, rgba(53,224,162,.06), transparent 60%),
    radial-gradient(800px 600px at 0% 30%, rgba(53,224,162,.03), transparent 60%),
    var(--bg);
}
body.modal-open{overflow:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img,svg{display:block}
.disp{font-family:var(--disp)}
.sr-only{
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
  clip:rect(0,0,0,0);white-space:nowrap;border:0;
}
.skip-link{
  position:absolute;left:20px;top:-48px;z-index:200;
  padding:10px 14px;border-radius:8px;background:var(--mint);color:#04120c;
  font-family:var(--disp);font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
}
.skip-link:focus{top:12px}
:focus-visible{
  outline:2px solid var(--mint);
  outline-offset:3px;
}

/* ---------- top nav ---------- */
.topbar{
  background:rgba(6,12,10,.94);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(8px);
}
.topbar-inner{
  max-width:1280px;margin:0 auto;padding:0 20px;
  height:78px;display:flex;align-items:center;gap:20px;
}
.brand{display:flex;align-items:center;gap:13px;margin-right:auto}
.brand img{height:58px;width:58px;object-fit:cover;border-radius:10px;box-shadow:0 0 20px rgba(53,224,162,.4)}
.brand .bn{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:1.8px;text-transform:uppercase;line-height:1.02;text-shadow:0 0 18px rgba(53,224,162,.3)}
.brand .bn span{color:var(--mint)}
.nav-links{display:flex;gap:4px}
.nav-links a{
  font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:1.6px;text-transform:uppercase;
  color:var(--muted);padding:9px 13px;border-radius:8px;
  border-bottom:2px solid transparent;transition:color .12s;
}
.nav-links a.active{color:var(--mint);border-bottom-color:var(--mint)}
.menu-btn{
  display:none;align-items:center;
  font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--text);border:1px solid var(--line-2);border-radius:9px;padding:11px 15px;
}
.menu-btn:hover{border-color:var(--mint);color:var(--mint)}
.play-btn{
  font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:1.6px;text-transform:uppercase;
  border:1px solid var(--mint);color:var(--mint);border-radius:9px;
  padding:12px 20px;display:inline-flex;align-items:center;gap:9px;
  box-shadow:0 0 16px rgba(53,224,162,.18), inset 0 0 12px rgba(53,224,162,.06);
  transition:background .15s, color .15s;
}
.play-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint)}
.play-btn.soon{border-color:var(--line-2);color:var(--muted);box-shadow:none;cursor:default}
.play-btn.soon .dot{background:#c9a24a;box-shadow:0 0 8px #c9a24a}

/* ---------- hero (home) ---------- */
.hero{
  position:relative;overflow:hidden;min-height:600px;display:flex;align-items:center;
  border-bottom:1px solid var(--line);
  background:
    linear-gradient(90deg, rgba(6,13,10,.94) 0%, rgba(6,13,10,.7) 24%, rgba(6,13,10,.12) 46%, rgba(6,13,10,.04) 60%, rgba(6,13,10,.5) 100%),
    linear-gradient(0deg, rgba(7,15,12,.85) 0%, transparent 30%),
    url("assets/hero-art.jpg") center 60% / cover;
}
.hero-inner{
  width:100%;max-width:1280px;margin:0 auto;padding:56px 20px;
  display:grid;grid-template-columns:1.15fr .85fr;gap:36px;align-items:center;
}
.hero-copy{max-width:520px}
.eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:2.5px;color:var(--mint);
  background:rgba(53,224,162,.08);border:1px solid rgba(53,224,162,.25);
  padding:7px 14px;border-radius:6px;margin-bottom:22px;text-transform:uppercase;
}
.hero h1{
  font-family:var(--disp);font-weight:700;font-size:clamp(40px,5.6vw,68px);
  line-height:1.04;letter-spacing:1px;text-transform:uppercase;
  text-shadow:0 4px 24px rgba(0,0,0,.6);
}
.hero h1 .m{color:var(--mint);text-shadow:0 0 26px rgba(53,224,162,.45)}
.hero .sub{margin-top:20px;font-size:17px;font-weight:500;color:#cfe3d9;max-width:440px;line-height:1.6;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.cta-row{margin-top:28px;display:flex;gap:12px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:1.8px;text-transform:uppercase;
  border-radius:9px;padding:15px 26px;transition:transform .12s, filter .15s, background .15s;
}
.btn:active{transform:translateY(1px)}
.btn-solid{background:var(--mint);color:#04120c;box-shadow:0 0 24px rgba(53,224,162,.35)}
.btn-solid:hover{filter:brightness(1.08)}
.btn-line{border:1px solid var(--line-2);color:var(--text);background:rgba(6,13,10,.5)}
.btn-line:hover{border-color:var(--mint);color:var(--mint)}
.chip-row{margin-top:34px;display:flex;gap:26px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:1.6px;color:var(--muted);text-transform:uppercase;transition:color .12s}
.chip .d{width:8px;height:8px;background:var(--mint);rotate:45deg;box-shadow:0 0 8px var(--mint-glow)}
.chip:hover{color:var(--text)}

/* server card */
.server-card{
  background:rgba(9,17,14,.88);border:1px solid var(--line-2);border-radius:14px;
  padding:24px;backdrop-filter:blur(6px);
  box-shadow:0 18px 50px rgba(0,0,0,.5), 0 0 30px rgba(53,224,162,.07);
  max-width:360px;justify-self:end;width:100%;
}
.sc-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.sc-players{font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.sc-status{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase}
.sc-status .dot{width:9px;height:9px;border-radius:50%;flex:none}
.sc-status.on{color:var(--mint)} .sc-status.on .dot{background:var(--mint);box-shadow:0 0 10px var(--mint)}
.sc-status.soon{color:#d8b968} .sc-status.soon .dot{background:#d8b968;box-shadow:0 0 10px #d8b968}
.sc-ip{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:1.2px;margin-top:14px;text-transform:uppercase}
.sc-ip.muted{color:var(--muted)}
.sc-note{font-size:14px;color:var(--muted);font-weight:500;margin-top:5px}
.sc-copy{
  margin-top:16px;width:100%;
  font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:1.8px;text-transform:uppercase;
  background:var(--mint);color:#04120c;border-radius:9px;padding:14px 0;
  transition:filter .15s, transform .12s;
}
button.sc-copy:hover{filter:brightness(1.08)} button.sc-copy:active{transform:translateY(1px)}
.sc-copy.is-soon{background:var(--panel-2);color:var(--muted);border:1px solid var(--line-2);text-align:center}
.sc-social{margin-top:14px;display:flex;gap:9px}
.sc-social a{
  flex:1;display:flex;align-items:center;justify-content:center;
  background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
  padding:11px 0;font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;
}
.sc-social a:hover{border-color:var(--mint);color:var(--mint)}

/* stats bar */
.stats-bar{
  max-width:1280px;margin:0 auto;padding:0 20px;width:100%;
  display:grid;grid-template-columns:repeat(5,1fr);gap:1px;
  background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:8px;
}
.stat{background:var(--bg2);padding:22px 16px;text-align:center}
.stat-n{font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:1px;color:var(--mint);line-height:1}
.stat-l{font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:1.6px;color:var(--muted);text-transform:uppercase;margin-top:8px}
@media(max-width:560px){.stats-bar{padding:0}}

/* trusted-by */
.trusted{text-align:center;padding-top:30px;padding-bottom:8px}
.trusted-label{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:2.4px;color:var(--mint);text-transform:uppercase}
.trusted-row{margin-top:16px;display:flex;flex-wrap:wrap;gap:28px 44px;align-items:center;justify-content:center}
.trusted-item{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;opacity:.7}
.about p{max-width:820px}

/* ---------- home sections ---------- */
.section{max-width:1280px;margin:0 auto;padding:46px 20px 8px;width:100%}
.sec-head{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:2.6px;color:var(--mint);text-transform:uppercase;display:flex;align-items:center;gap:14px}
.sec-head::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--line-2),transparent)}
.feature-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:22px}
.fcard{
  background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;transition:transform .15s, border-color .15s, box-shadow .15s;
}
.fc-img{width:100%;height:150px;overflow:hidden;border-bottom:1px solid var(--line)}
.fcard .fc-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
@media(hover:hover){.fcard:hover .fc-img img{transform:scale(1.05)}}
.fcard .fc-body{padding:18px 18px 20px;display:flex;flex-direction:column;gap:9px;flex:1}
.fcard h3{font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:1.6px;text-transform:uppercase}
.fcard p{font-size:14.5px;color:var(--muted);font-weight:500;line-height:1.55;flex:1}
.fcard .fc-btn{
  align-self:flex-start;margin-top:4px;
  font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:1.6px;text-transform:uppercase;
  border:1px solid var(--line-2);color:var(--text);border-radius:8px;padding:10px 16px;
  transition:border-color .15s,color .15s;
}
@media(hover:hover){
  .fcard:hover{transform:translateY(-4px);border-color:var(--mint);box-shadow:0 14px 40px rgba(0,0,0,.45), 0 0 24px rgba(53,224,162,.12)}
  .fcard .fc-btn:hover{border-color:var(--mint);color:var(--mint)}
}

/* ---------- store layout (category pages) ---------- */
.wrap{
  width:100%;max-width:1280px;margin:26px auto 30px;padding:0 20px;
  display:grid;grid-template-columns:270px 1fr;gap:22px;align-items:start;flex:1;
}
.wrap.home-mode{display:flex;flex-direction:column;align-items:stretch;padding:0;max-width:none;margin:0 0 30px;gap:0}
.wrap.home-mode .main{width:100%}
.wrap.home-mode .side{display:none}
.side{display:flex;flex-direction:column;gap:14px;position:sticky;top:88px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px}
.logo-card{padding:16px;text-align:center}
.logo-card img{width:100%;border-radius:10px}
.logo-sub{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:2.2px;color:var(--muted);margin-top:12px;text-transform:uppercase}
.nav-card{padding:8px}
.nav-item{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:12px 14px;margin:2px 0;border-radius:9px;color:var(--muted);
  font-family:var(--disp);font-weight:600;font-size:13.5px;letter-spacing:1.4px;text-transform:uppercase;
  transition:color .12s, background .12s;
}
.nav-item.active{background:rgba(53,224,162,.1);color:var(--mint);box-shadow:inset 0 0 0 1px rgba(53,224,162,.3)}
.nav-item .dot{width:8px;height:8px;border-radius:3px;flex:none;box-shadow:0 0 8px currentColor}
.nav-group-head{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:12px 14px;margin:2px 0;color:var(--text);
  font-family:var(--disp);font-weight:600;font-size:13.5px;letter-spacing:1.4px;text-transform:uppercase;
}
.nav-group-head .caret{margin-left:auto;transition:transform .15s;color:var(--muted);font-size:13px}
.nav-group.open .caret{transform:rotate(180deg)}
.nav-sub{display:none;padding-left:12px}
.nav-group.open .nav-sub{display:block}
.side-note{padding:18px;text-align:center}
.side-note .t{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:2px;color:var(--mint);margin-bottom:8px;text-transform:uppercase}
.side-note p{font-size:13.5px;color:var(--muted);font-weight:500;line-height:1.55}

.main{display:flex;flex-direction:column;gap:16px;min-width:0;scroll-margin-top:84px}
.card{padding:24px}
.card h2{font-family:var(--disp);font-weight:600;font-size:18px;letter-spacing:1.8px;color:var(--mint);margin-bottom:12px;text-transform:uppercase}
.card p{font-size:15.5px;line-height:1.65;color:var(--muted);font-weight:500}
.card p + p{margin-top:11px}
.card p strong{color:var(--text)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

.cat-head{
  padding:18px 22px;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.cat-head .ct{font-family:var(--disp);font-weight:600;font-size:19px;letter-spacing:2px;text-transform:uppercase}
.cat-head .cb{font-size:14px;color:var(--muted);font-weight:500}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.prod{
  padding:14px 14px 16px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:transform .15s, border-color .15s, box-shadow .15s;
}
.tile{
  width:100%;height:112px;position:relative;margin-bottom:10px;
  background:var(--slot);border:1px solid var(--tile-c, var(--line-2));border-radius:10px;
  box-shadow:inset 0 0 30px var(--tile-g, rgba(53,224,162,.08));
  display:flex;align-items:center;justify-content:center;
}
.tile svg{width:68px;height:68px;image-rendering:pixelated;filter:drop-shadow(0 0 9px var(--tile-g, rgba(53,224,162,.35)))}
.badge{
  position:absolute;right:9px;top:9px;
  background:rgba(6,12,10,.9);color:var(--mint-dim);border:1px solid var(--line-2);border-radius:6px;
  font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:1px;padding:2px 8px;
}
.prod .name{font-size:15.5px;font-weight:600;color:var(--text);line-height:1.3;flex:1;display:flex;align-items:center;justify-content:center}
.prod .buy,.prod .buy-state{margin-top:auto}
.prod .price{font-family:var(--disp);font-weight:600;font-size:16px;letter-spacing:1px;color:var(--mint);margin:3px 0 10px}
.prod .buy{
  width:100%;max-width:170px;min-height:44px;
  font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;
  background:var(--mint);color:#04120c;border-radius:9px;
  transition:filter .15s, transform .12s;
}
.prod .buy:active{transform:translateY(1px)}
.buy-state{
  width:100%;max-width:170px;min-height:44px;
  display:inline-flex;align-items:center;justify-content:center;
  padding:10px 12px;border-radius:9px;border:1px solid var(--line-2);
  background:var(--panel-2);color:var(--muted);
  font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;
}
@media(hover:hover){
  .nav-item:not(.active):hover{color:var(--text);background:rgba(255,255,255,.03)}
  .nav-links a:hover{color:var(--text)}
  .prod:hover{transform:translateY(-4px);border-color:var(--mint);box-shadow:0 12px 34px rgba(0,0,0,.45), 0 0 22px rgba(53,224,162,.1)}
  .prod .buy:hover{filter:brightness(1.08)}
}

/* ---------- footer ---------- */
footer{border-top:1px solid var(--line);background:var(--bg2);margin-top:auto}
.foot-inner{
  max-width:1280px;margin:0 auto;padding:28px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.foot-brand{display:flex;align-items:center;gap:11px}
.foot-brand img{height:36px;width:36px;object-fit:cover;border-radius:8px}
.foot-brand .bn{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:1.6px;text-transform:uppercase}
.foot-inner .fb{font-size:13px;color:var(--muted);font-weight:500;line-height:1.6;text-align:right}

/* ---------- modal ---------- */
.modal-bg{
  position:fixed;inset:0;background:rgba(3,8,6,.8);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--panel-2);border:1px solid var(--line-2);border-radius:14px;
  box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 40px rgba(53,224,162,.1);
  max-width:430px;width:100%;padding:28px;text-align:center;
}
.modal .tile{height:120px;max-width:200px;margin:0 auto 12px}
.modal h3{font-family:var(--disp);font-weight:600;font-size:19px;letter-spacing:1.6px;text-transform:uppercase;margin-bottom:4px}
.modal .mp{font-size:15px;color:var(--muted);font-weight:500;line-height:1.6;margin:12px 0 20px}
.modal .price-line{font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:1px;color:var(--mint)}
.modal .btn + .btn{margin-left:8px}

/* ---------- toast ---------- */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-160px);
  background:#0a1411;color:var(--mint);border:1px solid var(--mint);border-radius:10px;
  font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:1.4px;text-transform:uppercase;
  padding:13px 22px;z-index:120;
  transition:transform .25s ease;box-shadow:0 0 28px rgba(53,224,162,.3);
  visibility:hidden;
}
.toast.show{transform:translateX(-50%) translateY(0);visibility:visible}

/* ---------- responsive ---------- */
@media(max-width:1100px){
  .feature-grid{grid-template-columns:repeat(3,1fr);gap:14px}
}
@media(max-width:1000px){

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, char => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  }[char]));
}
function escapeAttr(value){
  return escapeHtml(value).replace(/`/g, "&#96;");
}
function normalizeText(value){
  return String(value ?? "").trim();
}
function safeExternalUrl(value){
  const text = normalizeText(value);
  if (!/^https?:\/\//i.test(text)) return "";
  try {
    const url = new URL(text);
    return /^(https?):$/i.test(url.protocol) && url.hostname.includes(".") ? url.href : "";
  } catch {
    return "";
  }
}

}
function safeServerIp(value){

}
function groupId(value){

  return `<svg viewBox="0 0 16 16" shape-rendering="crispEdges" aria-hidden="true">${rects}</svg>`;

  if (it.url) return safeExternalUrl(it.url);
  if (SAFE_CONFIG.checkoutUrl && it.checkoutId && /^[a-z0-9-]+$/i.test(String(it.checkoutId))){
    return SAFE_CONFIG.checkoutUrl.replace(/\/$/,"") + "/package/" + encodeURIComponent(it.checkoutId);
  }
  return null;
}
// Live-commerce copy only renders when at least one package is actually purchasable.
const anyBuyable = Object.values(CATALOG).some(c => c.items.some(it => itemUrl(it)));
const checkoutLive = !!SAFE_CONFIG.checkoutUrl && anyBuyable;
function getPageFromHash(){
  const raw = normalizeText(location.hash.replace(/^#/, ""));
  if (!raw || raw.toLowerCase() === "home") return "home";
  return Object.prototype.hasOwnProperty.call(CATALOG, raw) ? raw : "home";
}
function normalizeRoute(){
  const page = getPageFromHash();
  const canonicalHash = page === "home" ? "#home" : `#${page}`;
  if (location.hash !== canonicalHash){
    history.replaceState(null, "", canonicalHash);
  }
  return page;
}
function setMeta(name, content, property){
  const selector = property ? `meta[property="${property}"]` : `meta[name="${name}"]`;
  const el = document.querySelector(selector);
  if (el) el.setAttribute("content", content);
}
function updateDocumentMeta(page){
  const cat = CATALOG[page];
  const title = cat ? `${cat.group ? `${cat.group} ${cat.label}` : cat.label} | MintHaven Store` : DEFAULT_TITLE;
  const description = cat ? `${cat.label} for MintHaven MC. ${cat.blurb}` : DEFAULT_DESC;
  document.title = title;
  setMeta("description", description);
  setMeta(null, title, "og:title");
  setMeta(null, description, "og:description");
  setMeta("twitter:title", title);
  setMeta("twitter:description", description);
}
function scrollForRoute(isCat){
  if (!isCat){
    window.scrollTo({ top:0, behavior:"auto" });
    return;
  }
  requestAnimationFrame(() => {
    const topOffset = (topbar ? topbar.offsetHeight : 0) + 12;
    const top = main.getBoundingClientRect().top + window.scrollY - topOffset;
    window.scrollTo({ top: Math.max(0, top), behavior:"auto" });
    main.focus({ preventScroll:true });
  });
}
function copyIp(){
  if (!hasIp) return;
  if (navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(SAFE_CONFIG.serverIp)

function fallbackCopyIp(){
  const helper = document.createElement("textarea");
  helper.value = SAFE_CONFIG.serverIp;
  helper.setAttribute("readonly", "");
  helper.className = "sr-only";
  document.body.appendChild(helper);
  helper.select();
  try {
    document.execCommand("copy");
    showToast("Server IP copied!");
  } catch {
    showToast(`Server IP: ${SAFE_CONFIG.serverIp}`);
  } finally {
    helper.remove();
  }
}

/* Server status: only claim "Online" after a real, successful status check. */
let serverOnline = null;
function probeServer(){
  if (!hasIp) return;
  fetch("https://api.mcsrvstat.us/3/" + encodeURIComponent(SAFE_CONFIG.serverIp))
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      serverOnline = !!(d && d.online);
      const st = document.getElementById("scStatus");
      if (st && serverOnline){
        st.className = "sc-status on";
        st.innerHTML = `<span class="dot"></span>Server Online`;
      }
    })
    .catch(() => {});
}
const players = normalizeText(CONFIG.playersOnline).replace(/[^0-9,]/g, "");
const javaVersion = escapeHtml(normalizeText(CONFIG.javaVersion) || "Java Edition");
function socialRow(){
  if (!SOCIALS.length) return "";
  return `<div class="sc-social">${SOCIALS.map(([name, url]) =>
    `<a href="${escapeAttr(url)}" target="_blank" rel="noopener" aria-label="${escapeAttr(name)}">${escapeHtml(name)}</a>`).join("")}</div>`;
}
function serverCardHtml(){
  const online = hasIp && serverOnline === true;
  const statusText = online ? "Server Online" : (hasIp ? "Java Server" : "Server Launching Soon");
  return `<div class="server-card">
    <div class="sc-top">
      <div class="sc-status ${online ? "on" : "soon"}" id="scStatus"><span class="dot"></span>${statusText}</div>
      ${online && players ? `<div class="sc-players">${escapeHtml(players)} playing</div>` : ""}
    </div>
    <div class="sc-ip ${hasIp ? "" : "muted"}">${hasIp ? escapeHtml(SAFE_CONFIG.serverIp.toUpperCase()) : "ADDRESS AT LAUNCH"}</div>
    <div class="sc-note">${hasIp ? javaVersion : "The store is open now — the gates open soon."}</div>
    ${hasIp
      ? `<button class="sc-copy" id="scCopy" type="button">Copy IP</button>`
      : `<div class="sc-copy is-soon" aria-hidden="true">IP at Launch</div>`}
    ${socialRow()}
  </div>`;
}

    `<div class="stat"><div class="stat-n">${escapeHtml(String(s.n))}</div><div class="stat-l">${escapeHtml(String(s.l))}</div></div>`).join("")}</div>`;
}
function partnersStrip(){

  return `<section class="section trusted"><span class="trusted-label">Trusted by our community</span>
    <div class="trusted-row">${ps.map(p => `<span class="trusted-item">${escapeHtml(String(p))}</span>`).join("")}</div></section>`;

function catPage(key){
  const cat = CATALOG[key];
  const title = cat.group ? `${cat.group} — ${cat.label}` : cat.label;
  return `
  <div class="cat-head panel"><span class="ct">${escapeHtml(title)}</span><span class="cb">${escapeHtml(cat.blurb)}</span></div>
  <div class="grid">
    ${cat.items.map(it => `
      <div class="prod panel">
        ${tileHtml(cat, it)}
        <div class="name">${escapeHtml(it.name)}</div>
        <div class="price">${money(it.price)}</div>
        <button class="buy" type="button" data-cat="${escapeAttr(key)}" data-id="${escapeAttr(it.id)}" aria-label="${escapeAttr(`Buy ${it.name} — ${money(it.price)}`)}">Buy</button>
      </div>`).join("")}
  </div>`;
}

function render(){
  const page = normalizeRoute();
  const isCat = page !== "home" && !!CATALOG[page];
  updateDocumentMeta(page);
  wrapEl.classList.toggle("home-mode", !isCat);
  document.querySelectorAll(".nav-item").forEach(el => {
    const active = el.dataset.page === (isCat ? page : "home");
    el.classList.toggle("active", active);
    if (active) el.setAttribute("aria-current", "page");
    else el.removeAttribute("aria-current");
  });
  const topKey = isCat ? "shop" : "home";
  document.querySelectorAll("#topNav a").forEach(el => {
    const active = el.dataset.page === topKey;
    el.classList.toggle("active", active);
    if (active) el.setAttribute("aria-current", "page");
    else el.removeAttribute("aria-current");
  });
  nav.querySelectorAll(".nav-group").forEach(group => {
    group.classList.remove("open");
    const head = group.querySelector(".nav-group-head");
    if (head) head.setAttribute("aria-expanded", "false");
  });
  if (isCat && CATALOG[page].group){
    const targetGroupId = groupId(CATALOG[page].group);
    const g = Array.from(nav.querySelectorAll(".nav-group"))
      .find(group => group.dataset.groupId === targetGroupId);
    if (g){
      g.classList.add("open");
      const head = g.querySelector(".nav-group-head");
      if (head) head.setAttribute("aria-expanded", "true");
    }
  }
  main.innerHTML = isCat ? catPage(page) : homePage();
  main.setAttribute("aria-label", isCat ? `${CATALOG[page].label} catalog` : "MintHaven store home");
  scrollForRoute(isCat && window.matchMedia("(max-width:900px)").matches);
}
window.addEventListener("hashchange", () => { closeModal(); render(); });

/* ---------- buy modal ---------- */
const modalBg = document.getElementById("modalBg");
const modalCard = document.getElementById("modalCard");
const modalGo = document.getElementById("modalGo");
const modalClose = document.getElementById("modalClose");
let lastFocus = null;
function closeModal(){
  if (!modalBg.classList.contains("open")) return;
  modalBg.classList.remove("open");
  modalBg.setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
  modalGo.removeAttribute("href");
  if (lastFocus && document.contains(lastFocus)) { lastFocus.focus(); }
  lastFocus = null;
}
main.addEventListener("click", e => {
  const copyButton = e.target.closest("#scCopy");
  if (copyButton){
    copyIp();
    return;
  }
  const b = e.target.closest(".buy");
  if (!b) return;
  const cat = CATALOG[b.dataset.cat];
  if (!cat) return;
  const it = cat.items.find(x => x.id === b.dataset.id);
  if (!it) return;
  document.getElementById("modalArtWrap").innerHTML = tileHtml(cat, it);
  document.getElementById("modalName").textContent = it.name;
  document.getElementById("modalPrice").textContent = money(it.price);
  const msg = document.getElementById("modalMsg");
  const url = itemUrl(it);
  if (url){
    modalGo.style.display = "inline-flex";
    modalGo.href = url;
    msg.textContent = "You'll finish this purchase on our checkout.";
  } else {
    modalGo.style.display = "none";
    msg.textContent = "Online checkout is opening soon. " + (hasDiscord ? "Join the Discord to get notified the moment it's live." : "Check back shortly!");
  }
  lastFocus = b;
  modalBg.classList.add("open");
  modalBg.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
  modalCard.focus();
});
modalClose.onclick = closeModal;
modalBg.addEventListener("click", e => { if (e.target === modalBg) closeModal(); });
window.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
  if (e.key === "Tab" && modalBg.classList.contains("open")){
    const focusables = [modalGo, modalClose]
      .filter(el => el.style.display !== "none");
    const first = focusables[0], last = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
    else if (!focusables.includes(document.activeElement)){ e.preventDefault(); first.focus(); }
  }
});

/* ---------- top bar / footer ---------- */
const toast = document.getElementById("toast");
let toastTimer = null;
function showToast(text){
  if (toastTimer) clearTimeout(toastTimer);
  toast.textContent = text;
  toast.classList.add("show");
  toastTimer = window.setTimeout(() => {
    toast.classList.remove("show");
    toast.textContent = "";
    toastTimer = null;
  }, 2200);
}
const playBtn = document.getElementById("playBtn");
if (hasIp){
  document.getElementById("playBtnText").textContent = "Play Now";
  playBtn.title = "Copy server IP";
  playBtn.setAttribute("aria-label", "Copy server IP");
  playBtn.onclick = copyIp;
} else {
  playBtn.classList.add("soon");
  playBtn.disabled = true;
  playBtn.setAttribute("aria-disabled", "true");
  document.getElementById("playBtnText").textContent = "Launching Soon";
}
document.getElementById("sideHelp").textContent = hasContact
  ? "Questions about a purchase? Reach us and we'll sort it fast."
  : "Support contact details are coming soon.";
document.getElementById("footNote").textContent = checkoutLive && hasIp
  ? "Payments are processed securely; packages are delivered in game."
  : checkoutLive
    ? "Payments are processed securely; packages apply when the server opens."
    : "Every purchase supports the server.";
document.getElementById("year").textContent = new Date().getFullYear();

/* Skip link is a scroll/focus target, not a route — keep the router out of it. */
const skipLink = document.querySelector(".skip-link");
if (skipLink){
  skipLink.addEventListener("click", e => {
    e.preventDefault();
    main.focus();
    main.scrollIntoView({ block: "start" });
  });
}

/* Mobile nav toggle */
const menuBtn = document.getElementById("menuBtn");
const navLinks = document.getElementById("topNav");
function closeMenu(){
  if (!navLinks) return;
  navLinks.classList.remove("open");
  if (menuBtn) menuBtn.setAttribute("aria-expanded", "false");
}
if (menuBtn){
  menuBtn.addEventListener("click", () => {
    const open = navLinks.classList.toggle("open");
    menuBtn.setAttribute("aria-expanded", String(open));
  });
}

/* Smooth-scroll to on-page sections (nav + hero chips). Routes home first if needed. */
function scrollToSection(id){
  const go = () => {
    const el = document.getElementById(id);
    if (!el) return;
    const off = (topbar ? topbar.offsetHeight : 0) + 14;
    const top = el.getBoundingClientRect().top + window.scrollY - off;
    window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
  };
  if (getPageFromHash() !== "home"){
    if (location.hash && location.hash !== "#home"){ location.hash = "#home"; }
    else { render(); }
    requestAnimationFrame(() => requestAnimationFrame(go));
  } else {
    go();
  }
}
document.body.addEventListener("click", e => {
  const a = e.target.closest("[data-scroll]");
  if (!a) return;
  e.preventDefault();
  closeMenu();
  scrollToSection(a.getAttribute("data-scroll"));
});
if (navLinks){
  navLinks.addEventListener("click", e => { if (e.target.closest("a")) closeMenu(); });
}

probeServer();
render();
</script>
