<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MintHaven — Play. Earn. Build. Belong.</title>
<meta name="description" content="MintHaven MC official store — ranks, crate keys, claim blocks and more.">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070f0c;
  --bg2:#0a1411;
  --panel:#0d1915;
  --panel-2:#122019;
  --slot:#091310;
  --line:#1d2c26;
  --line-2:#2a3f36;
  --mint:#35e0a2;
  --mint-dim:#8fd9bd;
  --mint-deep:#17835c;
  --mint-glow:rgba(53,224,162,.4);
  --text:#eaf6f0;
  --muted:#9db5aa;
  --disp:"Oswald",system-ui,sans-serif;
  --body:"Barlow",system-ui,sans-serif;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg);scroll-behavior:smooth}
body{
  font-family:var(--body);font-size:16px;color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  background:
    radial-gradient(1000px 500px at 80% -100px, rgba(53,224,162,.06), transparent 60%),
    radial-gradient(800px 600px at 0% 30%, rgba(53,224,162,.03), transparent 60%),
    var(--bg);
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img,svg{display:block}
.disp{font-family:var(--disp)}

/* ---------- top nav ---------- */
.topbar{
  background:rgba(6,12,10,.94);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(8px);
}
.topbar-inner{
  max-width:1280px;margin:0 auto;padding:0 20px;
  height:64px;display:flex;align-items:center;gap:22px;
}
.brand{display:flex;align-items:center;gap:11px;margin-right:auto}
.brand img{height:44px;width:44px;object-fit:cover;border-radius:8px;box-shadow:0 0 14px rgba(53,224,162,.25)}
.brand .bn{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:1.5px;text-transform:uppercase;line-height:1.05}
.brand .bn span{color:var(--mint)}
.nav-links{display:flex;gap:4px}
.nav-links a{
  font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:1.6px;text-transform:uppercase;
  color:var(--muted);padding:9px 13px;border-radius:8px;
  border-bottom:2px solid transparent;transition:color .12s;
}
.nav-links a.active{color:var(--mint);border-bottom-color:var(--mint)}
.play-btn{
  font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:1.6px;text-transform:uppercase;
  border:1px solid var(--mint);color:var(--mint);border-radius:9px;
  padding:11px 18px;display:inline-flex;align-items:center;gap:9px;
  box-shadow:0 0 16px rgba(53,224,162,.18), inset 0 0 12px rgba(53,224,162,.06);
  transition:background .15s, color .15s;
}
.play-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint)}
.play-btn.soon{border-color:var(--line-2);color:var(--muted);box-shadow:none;cursor:default}
.play-btn.soon .dot{background:#c9a24a;box-shadow:0 0 8px #c9a24a;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ---------- hero (home) ---------- */
.hero{
  position:relative;overflow:hidden;
  border-bottom:1px solid var(--line);
  background:
    linear-gradient(90deg, rgba(6,13,10,.96) 0%, rgba(6,13,10,.86) 30%, rgba(6,13,10,.35) 58%, rgba(6,13,10,.25) 100%),
    linear-gradient(0deg, rgba(7,15,12,.92) 0%, transparent 34%),
    url("assets/hero-art.jpg") right 40% / cover;
}
.hero-inner{
  max-width:1280px;margin:0 auto;padding:64px 20px 58px;
  display:grid;grid-template-columns:1.25fr .75fr;gap:36px;align-items:center;
}
.eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:2.5px;color:var(--mint);
  background:rgba(53,224,162,.08);border:1px solid rgba(53,224,162,.25);
  padding:7px 14px;border-radius:6px;margin-bottom:22px;text-transform:uppercase;
}
.hero h1{
  font-family:var(--disp);font-weight:700;font-size:clamp(40px,5.6vw,68px);
  line-height:1.04;letter-spacing:1px;text-transform:uppercase;
  text-shadow:0 4px 24px rgba(0,0,0,.6);
}
.hero h1 .m{color:var(--mint);text-shadow:0 0 26px rgba(53,224,162,.45)}
.hero .sub{margin-top:20px;font-size:17px;font-weight:500;color:#cfe3d9;max-width:440px;line-height:1.6;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.cta-row{margin-top:28px;display:flex;gap:12px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:1.8px;text-transform:uppercase;
  border-radius:9px;padding:15px 26px;transition:transform .12s, filter .15s, background .15s;
}
.btn:active{transform:translateY(1px)}
.btn-solid{background:var(--mint);color:#04120c;box-shadow:0 0 24px rgba(53,224,162,.35)}
.btn-solid:hover{filter:brightness(1.08)}
.btn-line{border:1px solid var(--line-2);color:var(--text);background:rgba(6,13,10,.5)}
.btn-line:hover{border-color:var(--mint);color:var(--mint)}
.chip-row{margin-top:34px;display:flex;gap:26px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:1.8px;color:var(--muted);text-transform:uppercase}
.chip .d{width:8px;height:8px;background:var(--mint);rotate:45deg;box-shadow:0 0 8px var(--mint-glow)}

/* server card */
.server-card{
  background:rgba(9,17,14,.88);border:1px solid var(--line-2);border-radius:14px;
  padding:24px;backdrop-filter:blur(6px);
  box-shadow:0 18px 50px rgba(0,0,0,.5), 0 0 30px rgba(53,224,162,.07);
  max-width:360px;justify-self:end;width:100%;
}
.sc-status{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:2px;text-transform:uppercase}
.sc-status .dot{width:9px;height:9px;border-radius:50%}
.sc-status.on{color:var(--mint)} .sc-status.on .dot{background:var(--mint);box-shadow:0 0 10px var(--mint)}
.sc-status.soon{color:#d8b968} .sc-status.soon .dot{background:#d8b968;box-shadow:0 0 10px #d8b968;animation:pulse 1.6s infinite}
.sc-ip{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:1.2px;margin-top:14px;text-transform:uppercase}
.sc-ip.muted{color:var(--muted)}
.sc-note{font-size:14px;color:var(--muted);font-weight:500;margin-top:5px}
.sc-copy{
  margin-top:16px;width:100%;
  font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:1.8px;text-transform:uppercase;
  background:var(--mint);color:#04120c;border-radius:9px;padding:14px 0;
  transition:filter .15s, transform .12s;
}
.sc-copy:hover{filter:brightness(1.08)} .sc-copy:active{transform:translateY(1px)}
.sc-copy[disabled]{background:var(--panel-2);color:var(--muted);cursor:default;border:1px solid var(--line-2)}
.sc-social{margin-top:14px;display:flex;gap:9px}
.sc-social a{
  flex:1;display:flex;align-items:center;justify-content:center;
  background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
  padding:11px 0;font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:1.4px;color:var(--muted);text-transform:uppercase;
}
.sc-social a:hover{border-color:var(--mint);color:var(--mint)}

/* ---------- home sections ---------- */
.section{max-width:1280px;margin:0 auto;padding:46px 20px 8px;width:100%}
.sec-head{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:2.6px;color:var(--mint);text-transform:uppercase;display:flex;align-items:center;gap:14px}
.sec-head::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--line-2),transparent)}
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:22px}
.fcard{
  background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;transition:transform .15s, border-color .15s, box-shadow .15s;
}
.fcard img{width:100%;height:150px;object-fit:cover;border-bottom:1px solid var(--line)}
.fcard .fc-body{padding:18px 18px 20px;display:flex;flex-direction:column;gap:9px;flex:1}
.fcard h3{font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:1.6px;text-transform:uppercase}
.fcard p{font-size:14.5px;color:var(--muted);font-weight:500;line-height:1.55;flex:1}
.fcard .fc-btn{
  align-self:flex-start;margin-top:4px;
  font-family:var(--disp);font-weight:600;font-size:12.5px;letter-spacing:1.8px;text-transform:uppercase;
  border:1px solid var(--line-2);color:var(--text);border-radius:8px;padding:10px 16px;
  transition:border-color .15s,color .15s;
}
@media(hover:hover){
  .fcard:hover{transform:translateY(-4px);border-color:var(--mint);box-shadow:0 14px 40px rgba(0,0,0,.45), 0 0 24px rgba(53,224,162,.12)}
  .fcard .fc-btn:hover{border-color:var(--mint);color:var(--mint)}
}

/* ---------- store layout (category pages) ---------- */
.wrap{
  width:100%;max-width:1280px;margin:26px auto 30px;padding:0 20px;
  display:grid;grid-template-columns:270px 1fr;gap:22px;align-items:start;flex:1;
}
.wrap.home-mode{display:flex;flex-direction:column;padding:0;max-width:none;margin:0 0 30px;gap:0}
.wrap.home-mode .side{display:none}
.side{display:flex;flex-direction:column;gap:14px;position:sticky;top:88px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px}
.logo-card{padding:16px;text-align:center}
.logo-card img{width:100%;border-radius:10px}
.logo-sub{font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:2.2px;color:var(--muted);margin-top:12px;text-transform:uppercase}
.nav-card{padding:8px}
.nav-item{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:12px 14px;margin:2px 0;border-radius:9px;color:var(--muted);
  font-family:var(--disp);font-weight:600;font-size:13.5px;letter-spacing:1.4px;text-transform:uppercase;
  transition:color .12s, background .12s;
}
.nav-item.active{background:rgba(53,224,162,.1);color:var(--mint);box-shadow:inset 0 0 0 1px rgba(53,224,162,.3)}
.nav-item .dot{width:8px;height:8px;border-radius:3px;flex:none;box-shadow:0 0 8px currentColor}
.nav-group-head{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:12px 14px;margin:2px 0;color:var(--text);
  font-family:var(--disp);font-weight:600;font-size:13.5px;letter-spacing:1.4px;text-transform:uppercase;
}
.nav-group-head .caret{margin-left:auto;transition:transform .15s;color:var(--muted);font-size:12px}
.nav-group.open .caret{transform:rotate(180deg)}
.nav-sub{display:none;padding-left:12px}
.nav-group.open .nav-sub{display:block}
.side-note{padding:18px;text-align:center}
.side-note .t{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:2px;color:var(--mint);margin-bottom:8px;text-transform:uppercase}
.side-note p{font-size:13.5px;color:var(--muted);font-weight:500;line-height:1.55}

.main{display:flex;flex-direction:column;gap:16px;min-width:0;scroll-margin-top:84px}
.card{padding:24px}
.card h2{font-family:var(--disp);font-weight:600;font-size:18px;letter-spacing:1.8px;color:var(--mint);margin-bottom:12px;text-transform:uppercase}
.card p{font-size:15.5px;line-height:1.65;color:var(--muted);font-weight:500}
.card p + p{margin-top:11px}
.card p strong{color:var(--text)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

.cat-head{
  padding:18px 22px;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.cat-head .ct{font-family:var(--disp);font-weight:600;font-size:19px;letter-spacing:2px;text-transform:uppercase}
.cat-head .cb{font-size:14px;color:var(--muted);font-weight:500}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.prod{
  padding:14px 14px 16px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:transform .15s, border-color .15s, box-shadow .15s;
}
.tile{
  width:100%;height:112px;position:relative;margin-bottom:10px;
  background:var(--slot);border:1px solid var(--tile-c, var(--line-2));border-radius:10px;
  box-shadow:inset 0 0 30px var(--tile-g, rgba(53,224,162,.08));
  display:flex;align-items:center;justify-content:center;
}
.tile svg{width:68px;height:68px;image-rendering:pixelated;filter:drop-shadow(0 0 9px var(--tile-g, rgba(53,224,162,.35)))}
.badge{
  position:absolute;right:9px;top:9px;
  background:rgba(6,12,10,.9);color:var(--mint-dim);border:1px solid var(--line-2);border-radius:6px;
  font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:1px;padding:3px 8px;
}
.prod .name{font-size:15.5px;font-weight:600;color:var(--text);line-height:1.3}
.prod .price{font-family:var(--disp);font-weight:600;font-size:16px;letter-spacing:1px;color:var(--mint);margin:3px 0 10px}
.prod .buy{
  width:100%;max-width:170px;min-height:44px;
  font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;
  background:var(--mint);color:#04120c;border-radius:9px;
  transition:filter .15s, transform .12s;
}
.prod .buy:active{transform:translateY(1px)}
@media(hover:hover){
  .nav-item:not(.active):hover{color:var(--text);background:rgba(255,255,255,.03)}
  .nav-links a:hover{color:var(--text)}
  .prod:hover{transform:translateY(-4px);border-color:var(--mint);box-shadow:0 12px 34px rgba(0,0,0,.45), 0 0 22px rgba(53,224,162,.1)}
  .prod .buy:hover{filter:brightness(1.08)}
}

/* ---------- footer ---------- */
footer{border-top:1px solid var(--line);background:var(--bg2);margin-top:auto}
.foot-inner{
  max-width:1280px;margin:0 auto;padding:28px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.foot-brand{display:flex;align-items:center;gap:11px}
.foot-brand img{height:36px;width:36px;object-fit:cover;border-radius:8px}
.foot-brand .bn{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:1.6px;text-transform:uppercase}
.foot-inner .fb{font-size:13px;color:var(--muted);font-weight:500;line-height:1.6;text-align:right}

/* ---------- modal ---------- */
.modal-bg{
  position:fixed;inset:0;background:rgba(3,8,6,.8);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--panel-2);border:1px solid var(--line-2);border-radius:14px;
  box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 40px rgba(53,224,162,.1);
  max-width:430px;width:100%;padding:28px;text-align:center;
}
.modal .tile{height:120px;max-width:200px;margin:0 auto 12px}
.modal h3{font-family:var(--disp);font-weight:600;font-size:19px;letter-spacing:1.6px;text-transform:uppercase;margin-bottom:4px}
.modal .mp{font-size:15px;color:var(--muted);font-weight:500;line-height:1.6;margin:12px 0 20px}
.modal .price-line{font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:1px;color:var(--mint)}
.modal .btn + .btn{margin-left:8px}

/* ---------- toast ---------- */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-160px);
  background:#0a1411;color:var(--mint);border:1px solid var(--mint);border-radius:10px;
  font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:1.4px;text-transform:uppercase;
  padding:13px 22px;z-index:120;
  transition:transform .25s ease;box-shadow:0 0 28px rgba(53,224,162,.3);
  visibility:hidden;
}
.toast.show{transform:translateX(-50%) translateY(0);visibility:visible}

/* ---------- responsive ---------- */
@media(max-width:1000px){
  .hero-inner{grid-template-columns:1fr;padding:44px 18px}
  .server-card{justify-self:start;max-width:420px}
  .feature-grid{grid-template-columns:1fr}
  .nav-links{display:none}
}
@media(max-width:900px){
  .wrap{display:flex;flex-direction:column;gap:14px;align-items:stretch}
  .side{display:contents}
  .logo-card{order:0}
  .nav-card{order:1}
  .main{order:2}
  .side-note{order:3}
  .grid{grid-template-columns:repeat(2,1fr)}
  .brand .bn{font-size:16px}
}
@media(max-width:520px){
  .grid{grid-template-columns:1fr}
  .play-btn{display:none}
}
@media(prefers-reduced-motion:reduce){
  .play-btn.soon .dot,.sc-status.soon .dot{animation:none}
}
</style>
</head>

<script>
/* ---------- pixel sprite renderer ---------- */
const SLOT = "#08110d";
function helm(A,B,C){ return [
  [4,3,8,1,B],[3,4,10,3,A],[5,7,6,2,SLOT],
  [3,7,2,4,A],[11,7,2,4,A],[12,4,1,3,C],[3,10,2,1,C],[11,10,2,1,C]
];}
function key(K,L){ return [
  [4,2,4,1,K],[3,3,1,4,K],[7,3,1,4,K],[4,6,4,1,K],
  [5,7,2,6,K],[7,9,2,1,K],[7,12,2,1,K],[4,2,2,1,L]
];}
const CROWN = [
  [3,10,10,3,"#ffd167"],[3,5,2,5,"#ffd167"],[7,4,2,6,"#ffd167"],[11,5,2,5,"#ffd167"],
  [4,11,2,1,"#35e0a2"],[7,11,2,1,"#ff6b61"],[10,11,2,1,"#5bb8ff"],[3,10,10,1,"#ffe49d"]
];
const BLOCK = [
  [3,3,10,3,"#4fca77"],[3,3,10,1,"#8fe0af"],
  [3,6,10,7,"#a9744f"],[3,6,10,1,"#8a5c3b"],
  [5,8,2,2,"#8a5c3b"],[9,10,2,2,"#8a5c3b"],[4,4,2,1,"#b6f0cb"]
];
const TICKET = [
  [2,5,12,6,"#35e0a2"],[2,5,12,1,"#8fe0af"],[2,10,12,1,"#17835c"],
  [7,5,1,6,"#08110d"],[9,7,3,2,"#08110d"],[4,7,2,2,"#08110d"]
];
const STAR = [
  [7,2,2,3,"#ffd167"],[7,11,2,3,"#ffd167"],[2,7,3,2,"#ffd167"],[11,7,3,2,"#ffd167"],
  [5,5,6,6,"#ffd167"],[6,6,4,4,"#ffe49d"],[7,7,2,2,"#fff4d6"]
];
const CLOUD = [
  [3,4,10,3,"#eef4fb"],[4,3,8,1,"#ffffff"],[3,7,10,1,"#9fb4cc"],
  [4,9,1,2,"#5bb8ff"],[7,10,1,2,"#5bb8ff"],[10,9,1,2,"#5bb8ff"],[6,12,1,2,"#5bb8ff"],[9,13,1,2,"#5bb8ff"]
];
const ART = {
  "helm-iron": helm("#c3cdc8","#ecf2ef","#93a09b"),
  "helm-gold": helm("#ffd167","#ffe49d","#cf982a"),
  "helm-dia":  helm("#57d4e0","#a8ecf2","#3aa8b5"),
  "helm-em":   helm("#35e0a2","#8fe0af","#2fae74"),
  "crown":     CROWN,
  "key-mint":  key("#35e0a2","#a5ecc9"),
  "key-gold":  key("#ffd167","#ffe49d"),
  "key-red":   key("#ff6b61","#ffa39c"),
  "key-blue":  key("#5bb8ff","#a6d8ff"),
  "key-cyan":  key("#3ed3c0","#9fe8de"),
  "key-pink":  key("#ff7bc2","#ffb6dd"),
  "key-grey":  key("#aab6b1","#d3dcd8"),
  "block":     BLOCK,
  "ticket":    TICKET,
  "star":      STAR,
  "cloud":     CLOUD
};
const TILES = {
  mint:   ["#2c8f6a","rgba(53,224,162,.3)"],
  blue:   ["#3a6f9e","rgba(91,184,255,.3)"],
  amber:  ["#8f7434","rgba(255,209,103,.28)"],
  purple: ["#6d5a9e","rgba(200,155,255,.3)"],
  teal:   ["#2f8a80","rgba(62,211,192,.3)"]
};
function artSvg(artKey){
  const cells = ART[artKey] || ART["key-mint"];
  const rects = cells.map(([x,y,w,h,f]) => `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${f}"/>`).join("");
  return `<svg viewBox="0 0 16 16" shape-rendering="crispEdges" aria-hidden="true">${rects}</svg>`;
}
function tileHtml(cat, it){
  const [c, g] = TILES[cat.tile] || TILES.mint;
  return `<div class="tile" style="--tile-c:${c};--tile-g:${g}">${artSvg(it.art)}${it.badge ? `<span class="badge">${it.badge}</span>` : ""}</div>`;
}

/* ---------- sidebar nav ---------- */
const nav = document.getElementById("nav");
function buildNav(){
  const groups = [];
  const seen = {};
  groups.push({type:"link", key:"home", label:"Store Home", dot:"#35e0a2"});
  for (const [key, cat] of Object.entries(CATALOG)){
    const dot = (TILES[cat.tile] || TILES.mint)[0];
    if (!cat.group){
      groups.push({type:"link", key, label:cat.label, dot});
    } else {
      if (!seen[cat.group]){ seen[cat.group] = {type:"group", label:cat.group, children:[]}; groups.push(seen[cat.group]); }
      seen[cat.group].children.push({key, label:cat.label, dot});
    }
  }
  nav.innerHTML = groups.map(g => {
    if (g.type === "link")
      return `<a class="nav-item" data-page="${g.key}" href="#${g.key === "home" ? "" : g.key}"><span class="dot" style="background:${g.dot};color:${g.dot}"></span>${g.label}</a>`;
    const kids = g.children.map(c =>
      `<a class="nav-item" data-page="${c.key}" href="#${c.key}"><span class="dot" style="background:${c.dot};color:${c.dot}"></span>${c.label}</a>`).join("");
    return `<div class="nav-group" data-group="${g.label}">
      <button class="nav-group-head" type="button" aria-expanded="false"><span class="dot" style="background:#4a5c54;color:#4a5c54"></span>${g.label}<span class="caret">▾</span></button>
      <div class="nav-sub">${kids}</div></div>`;
  }).join("");
  nav.querySelectorAll(".nav-group-head").forEach(h =>
    h.addEventListener("click", () => {
      h.parentElement.classList.toggle("open");
      h.setAttribute("aria-expanded", h.parentElement.classList.contains("open"));
    }));
}
buildNav();

/* ---------- pages ---------- */
const main = document.getElementById("main");
const wrapEl = document.getElementById("wrapEl");
const checkoutLive = !!CONFIG.checkoutUrl;
const hasDiscord = !!CONFIG.discord;
const hasMail = !!CONFIG.contactEmail;
const hasContact = hasDiscord || hasMail;
const hasIp = !!CONFIG.serverIp;
function money(n){ return "$" + n.toFixed(2) + " USD"; }
function itemUrl(it){
  if (it.url) return it.url;
  if (checkoutLive && it.checkoutId) return CONFIG.checkoutUrl.replace(/\/$/,"") + "/package/" + it.checkoutId;
  return null;
}
function copyIp(){
  navigator.clipboard.writeText(CONFIG.serverIp)
    .then(() => showToast("Server IP copied!"))
    .catch(() => showToast("Copy failed — IP: " + CONFIG.serverIp));
}

function serverCardHtml(){
  if (hasIp){
    return `<div class="server-card">
      <div class="sc-status on"><span class="dot"></span>Server Online</div>
      <div class="sc-ip">${CONFIG.serverIp.toUpperCase()}</div>
      <div class="sc-note">Java Edition</div>
      <button class="sc-copy" id="scCopy">Copy IP</button>
      ${hasDiscord ? `<div class="sc-social"><a href="${CONFIG.discord}" target="_blank" rel="noopener">Discord</a></div>` : ""}
    </div>`;
  }
  return `<div class="server-card">
    <div class="sc-status soon"><span class="dot"></span>Server Launching Soon</div>
    <div class="sc-ip muted">Address at launch</div>
    <div class="sc-note">The store is open now — the gates open soon.</div>
    <button class="sc-copy" disabled>Copy IP — Soon</button>
    ${hasDiscord ? `<div class="sc-social"><a href="${CONFIG.discord}" target="_blank" rel="noopener">Discord</a></div>` : ""}
  </div>`;
}

function homePage(){
  return `
  <section class="hero">
    <div class="hero-inner">
      <div>
        <span class="eyebrow">Minecraft ✦ Community</span>
        <h1>Play. Earn.<br>Build. <span class="m">Belong.</span></h1>
        <p class="sub">MintHaven is a Minecraft network where adventure meets ownership. The store is open — the server opens its gates soon.</p>
        <div class="cta-row">
          <a class="btn btn-solid" href="#ranks">Browse the Store</a>
          ${hasDiscord ? `<a class="btn btn-line" href="${CONFIG.discord}" target="_blank" rel="noopener">Join the Haven</a>` : ""}
        </div>
        <div class="chip-row">
          <span class="chip"><span class="d"></span>Survival</span>
          <span class="chip"><span class="d"></span>Oneblock</span>
          <span class="chip"><span class="d"></span>Community Driven</span>
        </div>
      </div>
      ${serverCardHtml()}
    </div>
  </section>

  <section class="section">
    <div class="sec-head">Featured in the store</div>
    <div class="feature-grid">
      <a class="fcard" href="#ranks">
        <img src="assets/card-ranks.jpg" alt="">
        <div class="fc-body">
          <h3>Global Ranks</h3>
          <p>Permanent ranks with perks across every game mode — VIP through MVP.</p>
          <span class="fc-btn">View Ranks ›</span>
        </div>
      </a>
      <a class="fcard" href="#survival-crates">
        <img src="assets/card-crates.jpg" alt="">
        <div class="fc-body">
          <h3>Crate Keys</h3>
          <p>Samurai, Divine, Ultra and more — keys and bundles for Survival and Oneblock.</p>
          <span class="fc-btn">View Crates ›</span>
        </div>
      </a>
      <a class="fcard" href="#survival-claim">
        <img src="assets/card-claim.jpg" alt="">
        <div class="fc-body">
          <h3>Claim Blocks</h3>
          <p>Protect more of your land in Survival — from 2k to 40k blocks.</p>
          <span class="fc-btn">View Claim Blocks ›</span>
        </div>
      </a>
    </div>
  </section>

  <section class="section" style="padding-bottom:28px">
    <div class="card panel">
      <h2>Thank you</h2>
      <p>Thank you for supporting <strong>MintHaven MC</strong>. Everything you buy here goes straight back into the server — hosting, plugins and new content.</p>
      ${checkoutLive ? `
      <p><strong>Delivery:</strong> packages are applied to your account automatically. If your purchase hasn't arrived within 15 minutes, relog once${hasContact ? " — still missing? Contact us and we'll fix it" : ""}.</p>
      <p><strong>Important:</strong> make sure you enter your exact Minecraft username at checkout. All purchases are final.</p>` : `
      <p><strong>Heads up:</strong> online checkout is opening soon — browse the packages now and check back shortly.</p>`}
      ${hasContact ? `<div class="btn-row">
        ${hasDiscord ? `<a class="btn btn-solid" href="${CONFIG.discord}" target="_blank" rel="noopener">Join our Discord</a>` : ""}
        ${hasMail ? `<a class="btn btn-line" href="mailto:${CONFIG.contactEmail}">Contact</a>` : ""}
      </div>` : ""}
    </div>
  </section>`;
}

function catPage(key){
  const cat = CATALOG[key];
  const title = cat.group ? `${cat.group} — ${cat.label}` : cat.label;
  return `
  <div class="cat-head panel"><span class="ct">${title}</span><span class="cb">${cat.blurb}</span></div>
  <div class="grid">
    ${cat.items.map(it => `
      <div class="prod panel">
        ${tileHtml(cat, it)}
        <div class="name">${it.name}</div>
        <div class="price">${money(it.price)}</div>
        <button class="buy" data-cat="${key}" data-id="${it.id}" aria-label="Buy ${it.name} — ${money(it.price)}">Buy</button>
      </div>`).join("")}
  </div>`;
}

function render(){
  const page = (location.hash || "#").slice(1) || "home";
  const isCat = page !== "home" && !!CATALOG[page];
  wrapEl.classList.toggle("home-mode", !isCat);
  document.querySelectorAll(".nav-item").forEach(el =>
    el.classList.toggle("active", el.dataset.page === (isCat ? page : "home")));
  const topKey = !isCat ? "home" : (page === "ranks" ? "ranks" : (page.startsWith("survival") ? "survival" : "oneblock"));
  document.querySelectorAll("#topNav a").forEach(el =>
    el.classList.toggle("active", el.dataset.page === topKey));
  if (isCat && CATALOG[page].group){
    const g = nav.querySelector(`.nav-group[data-group="${CATALOG[page].group}"]`);
    if (g){ g.classList.add("open"); g.querySelector(".nav-group-head").setAttribute("aria-expanded","true"); }
  }
  main.innerHTML = isCat ? catPage(page) : homePage();
  if (!isCat){
    const sc = document.getElementById("scCopy");
    if (sc) sc.onclick = copyIp;
  }
  if (isCat && window.matchMedia("(max-width:900px)").matches) main.scrollIntoView();
  else window.scrollTo({top:0});
}
window.addEventListener("hashchange", () => { closeModal(); render(); });

/* ---------- buy modal ---------- */
const modalBg = document.getElementById("modalBg");
let lastFocus = null;
function closeModal(){
  if (!modalBg.classList.contains("open")) return;
  modalBg.classList.remove("open");
  if (lastFocus) { lastFocus.focus(); lastFocus = null; }
}
main.addEventListener("click", e => {
  const b = e.target.closest(".buy");
  if (!b) return;
  const cat = CATALOG[b.dataset.cat];
  const it = cat.items.find(x => x.id === b.dataset.id);
  document.getElementById("modalArtWrap").innerHTML = tileHtml(cat, it);
  document.getElementById("modalName").textContent = it.name;
  document.getElementById("modalPrice").textContent = money(it.price);
  const go = document.getElementById("modalGo");
  const msg = document.getElementById("modalMsg");
  const url = itemUrl(it);
  if (url){
    go.style.display = "inline-flex";
    go.href = url;
    msg.textContent = "You'll finish this purchase on our checkout.";
  } else {
    go.style.display = "none";
    msg.textContent = "Online checkout is opening soon. " + (hasDiscord ? "Join the Discord to get notified the moment it's live." : "Check back shortly!");
  }
  lastFocus = b;
  modalBg.classList.add("open");
  document.getElementById("modalClose").focus();
});
document.getElementById("modalClose").onclick = closeModal;
modalBg.addEventListener("click", e => { if (e.target === modalBg) closeModal(); });
window.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
  if (e.key === "Tab" && modalBg.classList.contains("open")){
    const focusables = [document.getElementById("modalGo"), document.getElementById("modalClose")]
      .filter(el => el.style.display !== "none");
    const first = focusables[0], last = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
    else if (!focusables.includes(document.activeElement)){ e.preventDefault(); first.focus(); }
  }
});

/* ---------- top bar / footer ---------- */
const toast = document.getElementById("toast");
function showToast(text){
  toast.textContent = text;
  toast.classList.add("show");
  setTimeout(() => { toast.classList.remove("show"); toast.textContent = ""; }, 2200);
}
const playBtn = document.getElementById("playBtn");
if (hasIp){
  document.getElementById("playBtnText").textContent = "Play Now";
  playBtn.title = "Copy server IP";
  playBtn.onclick = copyIp;
} else {
  playBtn.classList.add("soon");
  playBtn.disabled = true;
  document.getElementById("playBtnText").textContent = "Launching Soon";
}
document.getElementById("sideHelp").textContent = hasContact
  ? "Questions about a purchase? Reach us and we'll sort it fast."
  : "Support contact details are coming soon.";
document.getElementById("footNote").textContent = checkoutLive
  ? "Payments are processed securely; packages are delivered in game."
  : "Every purchase supports the server.";
document.getElementById("year").textContent = new Date().getFullYear();

render();
</script>
