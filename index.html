<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MintHaven Store</title>
<meta name="description" content="MintHaven MC official store — ranks, crate keys, claim blocks and more. Everything supports the server, and it's never pay-to-win.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f7f1;
  --surface:#ffffff;
  --surface-2:#fbfdf9;
  --ink:#222b2a;
  --ink-2:#5f6b68;
  --ink-3:#93a09b;
  --line:#e6ece2;
  --green:#3cbf6d; --green-d:#31a75d; --green-lt:#e3f5ea;
  --blue:#3ea6f0; --blue-lt:#e2f1fd;
  --purple:#977bef; --purple-lt:#ece6fc;
  --yellow:#ffcb45; --yellow-lt:#fff3d4;
  --teal:#2fbfae; --teal-lt:#ddf4f1;
  --orange:#ff9838; --orange-lt:#ffeeda;
  --r:16px; --r-lg:22px; --r-pill:100px;
  --shadow:0 12px 26px -14px rgba(30,60,40,.20);
  --shadow-lg:0 22px 44px -20px rgba(30,60,40,.28);
  --f-disp:"Baloo 2",system-ui,sans-serif;
  --f-body:"Nunito",system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg)}
body{
  font-family:var(--f-body);
  font-size:15px;color:var(--ink);
  background:var(--bg);
  min-height:100vh;display:flex;flex-direction:column;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.disp{font-family:var(--f-disp)}
img,svg{display:block}

/* ---------- top bar ---------- */
.topbar{
  background:rgba(255,255,255,.92);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(8px);
}
.topbar-inner{
  max-width:1140px;margin:0 auto;padding:0 16px;
  height:60px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;
}
.brand{grid-column:1;display:inline-flex;align-items:center;gap:10px;font-family:var(--f-disp);font-weight:800;font-size:19px;color:var(--ink)}
.brand-mk{width:24px;height:24px;border-radius:7px;background:linear-gradient(145deg,#5fe08a,var(--green-d));box-shadow:0 3px 8px -2px rgba(60,191,109,.6)}
.ip-chip{
  grid-column:2;
  display:flex;align-items:center;gap:9px;
  background:var(--green-lt);border:2px solid transparent;border-radius:var(--r-pill);
  padding:8px 16px;color:var(--green-d);
  font-size:13px;font-weight:800;letter-spacing:.4px;
  transition:border-color .15s, transform .1s;
}
.ip-chip.dead{color:var(--ink-3);background:var(--surface-2);cursor:default}
.ip-chip:active{transform:scale(.98)}
.ip-chip .hint{color:var(--ink-3);font-weight:700;letter-spacing:0}
.top-right{grid-column:3;justify-self:end;display:flex;align-items:center;gap:10px}
.top-btn{
  display:flex;align-items:center;
  background:var(--surface);border:2px solid var(--line);border-radius:var(--r-pill);
  padding:8px 16px;font-size:13px;font-weight:800;color:var(--ink-2);
}
.currency{font-size:13px;font-weight:800;color:var(--ink-3);padding:8px 4px}

/* ---------- layout ---------- */
.wrap{
  width:100%;max-width:1140px;margin:26px auto 56px;padding:0 16px;
  display:grid;grid-template-columns:280px 1fr;gap:24px;
  align-items:start;flex:1;
}

/* ---------- sidebar ---------- */
.side{display:flex;flex-direction:column;gap:16px;position:sticky;top:86px}
.logo-card{
  background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);
  padding:26px 16px 22px;text-align:center;
}
.logo-mk{
  width:74px;height:74px;border-radius:20px;margin:0 auto 14px;
  background:linear-gradient(145deg,#5fe08a,var(--green-d));
  box-shadow:0 10px 22px -8px rgba(60,191,109,.55);
  display:flex;align-items:center;justify-content:center;
}
.logo-mk svg{width:46px;height:46px;image-rendering:pixelated}
.logo-name{font-family:var(--f-disp);font-weight:800;font-size:22px;color:var(--ink)}
.logo-sub{font-size:13px;color:var(--ink-2);margin-top:2px;font-weight:700}
.nav-card{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden;padding:8px}
.nav-item{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:12px 14px;border-radius:12px;color:var(--ink-2);
  font-family:var(--f-disp);font-size:15px;font-weight:700;
  transition:background .12s,color .12s;
}
.nav-item.active{background:var(--green);color:#fff}
.nav-item .dot{width:10px;height:10px;border-radius:4px;flex:none}
.nav-item.active .dot{background:rgba(255,255,255,.85)!important}
.nav-group-head{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:12px 14px;border-radius:12px;color:var(--ink-2);
  font-family:var(--f-disp);font-size:15px;font-weight:700;
}
.nav-group-head .caret{margin-left:auto;transition:transform .15s;font-size:13px;color:var(--ink-3)}
.nav-group.open .caret{transform:rotate(180deg)}
.nav-sub{display:none;padding-left:14px}
.nav-group.open .nav-sub{display:block}
.side-note{
  background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);
  padding:18px;text-align:center;
}
.side-note .t{font-family:var(--f-disp);font-weight:800;font-size:16px;color:var(--ink);margin-bottom:6px}
.side-note p{font-size:13px;color:var(--ink-2);font-weight:700;line-height:1.55}

/* ---------- main ---------- */
.main{display:flex;flex-direction:column;gap:20px;min-width:0;scroll-margin-top:76px}
.banner{
  border-radius:var(--r-lg);box-shadow:var(--shadow-lg);
  background:linear-gradient(135deg,#5fe08a,#31a75d 65%,#2b9151);
  padding:34px 30px;position:relative;overflow:hidden;color:#fff;
}
.banner::after{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(340px 200px at 88% -40px, rgba(255,255,255,.28), transparent 70%),
    repeating-linear-gradient(0deg, transparent 0 30px, rgba(255,255,255,.045) 30px 32px),
    repeating-linear-gradient(90deg, transparent 0 30px, rgba(255,255,255,.045) 30px 32px);
  pointer-events:none;
}
.banner h1{font-family:var(--f-disp);font-weight:800;font-size:30px;position:relative}
.banner p{position:relative;margin-top:6px;font-weight:700;font-size:15px;color:rgba(255,255,255,.92);max-width:520px;line-height:1.55}
.card{
  background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);
  padding:22px;
}
.card h2{font-family:var(--f-disp);font-weight:800;font-size:19px;color:var(--ink);margin-bottom:10px}
.card p{font-size:15px;line-height:1.65;color:var(--ink-2);font-weight:600}
.card p + p{margin-top:11px}
.card p strong{color:var(--ink)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border-radius:var(--r-pill);padding:12px 22px;
  font-family:var(--f-disp);font-size:15px;font-weight:700;
  transition:transform .12s, box-shadow .12s, background .12s;
}
.btn-green{background:var(--green);color:#fff;box-shadow:0 5px 0 var(--green-d)}
.btn-green:active{transform:translateY(3px);box-shadow:0 2px 0 var(--green-d)}
.btn-ghost{background:var(--surface);color:var(--ink-2);border:2px solid var(--line)}

/* ---------- category grid ---------- */
.cat-head{
  background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);
  padding:16px 22px;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.cat-head .ct{font-family:var(--f-disp);font-weight:800;font-size:19px;color:var(--ink)}
.cat-head .cb{font-size:13px;color:var(--ink-2);font-weight:700}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.prod{
  background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);
  padding:14px 14px 16px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:transform .15s, box-shadow .15s;
}
.tile{
  width:100%;border-radius:var(--r);height:110px;
  display:flex;align-items:center;justify-content:center;
  position:relative;margin-bottom:9px;
}
.tile svg{width:72px;height:72px;image-rendering:pixelated}
.badge{
  position:absolute;right:10px;top:10px;
  background:#fff;color:var(--ink);border-radius:var(--r-pill);
  font-size:13px;font-weight:800;padding:2px 10px;box-shadow:var(--shadow);
}
.prod .name{font-family:var(--f-disp);font-size:16px;font-weight:700;color:var(--ink);line-height:1.25}
.prod .price{font-size:14px;font-weight:800;color:var(--ink-2);margin-bottom:9px}
.prod .buy{
  width:100%;max-width:170px;min-height:44px;
  background:var(--green);color:#fff;border-radius:var(--r-pill);
  font-family:var(--f-disp);font-size:15px;font-weight:700;
  box-shadow:0 5px 0 var(--green-d);
  transition:transform .12s, box-shadow .12s, background .12s;
}
.prod .buy:active{transform:translateY(3px);box-shadow:0 2px 0 var(--green-d)}

@media(hover:hover){
  .ip-chip:not(.dead):hover{border-color:var(--green)}
  .top-btn:hover{border-color:var(--ink-3)}
  .nav-item:not(.active):hover{background:var(--surface-2);color:var(--ink)}
  .nav-group-head:hover{background:var(--surface-2)}
  .btn-green:hover{background:#46cc78;transform:translateY(-2px);box-shadow:0 7px 0 var(--green-d)}
  .btn-ghost:hover{border-color:var(--ink-3)}
  .prod:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
  .prod .buy:hover{background:#46cc78;transform:translateY(-2px);box-shadow:0 7px 0 var(--green-d)}
}

/* ---------- footer ---------- */
footer{border-top:1px solid var(--line);background:var(--surface);margin-top:auto}
.foot-inner{
  max-width:1140px;margin:0 auto;padding:26px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
}
.foot-brand{display:inline-flex;align-items:center;gap:9px;font-family:var(--f-disp);font-weight:800;font-size:16px}
.foot-inner .fb{font-size:13px;color:var(--ink-2);font-weight:600;line-height:1.6}
.ptw{font-size:13px;font-weight:800;color:var(--green-d)}

/* ---------- modal ---------- */
.modal-bg{
  position:fixed;inset:0;background:rgba(24,38,30,.45);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);
  max-width:420px;width:100%;padding:26px;text-align:center;
}
.modal .tile{height:120px;max-width:200px;margin:0 auto 6px}
.modal h3{font-family:var(--f-disp);font-weight:800;font-size:20px;color:var(--ink);margin-bottom:2px}
.modal .mp{font-size:15px;color:var(--ink-2);font-weight:600;line-height:1.6;margin:10px 0 18px}
.modal .price-line{font-size:16px;font-weight:800;color:var(--ink-2)}
.modal .btn + .btn{margin-left:8px}

/* ---------- toast ---------- */
.toast{
  position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-140px);
  background:var(--ink);color:#fff;font-weight:800;font-size:14px;
  padding:11px 20px;border-radius:var(--r-pill);z-index:120;
  transition:transform .25s ease;box-shadow:var(--shadow-lg);
  visibility:hidden;
}
.toast.show{transform:translateX(-50%) translateY(0);visibility:visible}

/* ---------- responsive ---------- */
@media(max-width:900px){
  .wrap{display:flex;flex-direction:column;gap:16px;align-items:stretch}
  .side{display:contents}
  .logo-card{order:0}
  .nav-card{order:1}
  .main{order:2}
  .side-note{order:3}
  .topbar-inner{display:flex;justify-content:space-between;height:60px;padding:0 12px}
  .brand span{display:none}
  .ip-chip .hint{display:none}
  .grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:520px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<!-- ============ buy modal ============ -->
<div class="modal-bg" id="modalBg">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalName">
    <div id="modalArtWrap"></div>
    <h3 id="modalName"></h3>
    <div class="price-line" id="modalPrice"></div>
    <p class="mp" id="modalMsg"></p>
    <div>
      <a class="btn btn-green" id="modalGo" target="_blank" rel="noopener" style="display:none">Checkout</a>
      <button class="btn btn-ghost" id="modalClose">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status"></div>

<script>
/* ---------- pixel sprite renderer ---------- */
const SLOT = "#20302a";
function helm(A,B,C){ return [
  [4,3,8,1,B],[3,4,10,3,A],[5,7,6,2,SLOT],
  [3,7,2,4,A],[11,7,2,4,A],[12,4,1,3,C],[3,10,2,1,C],[11,10,2,1,C]
];}
function key(K,L){ return [
  [4,2,4,1,K],[3,3,1,4,K],[7,3,1,4,K],[4,6,4,1,K],
  [5,7,2,6,K],[7,9,2,1,K],[7,12,2,1,K],[4,2,2,1,L]
];}
const CROWN = [
  [3,10,10,3,"#f5b83d"],[3,5,2,5,"#f5b83d"],[7,4,2,6,"#f5b83d"],[11,5,2,5,"#f5b83d"],
  [4,11,2,1,"#3cbf6d"],[7,11,2,1,"#e2554d"],[10,11,2,1,"#3ea6f0"],[3,10,10,1,"#ffd97a"]
];
const BLOCK = [
  [3,3,10,3,"#4fca77"],[3,3,10,1,"#7ddf9e"],
  [3,6,10,7,"#a9744f"],[3,6,10,1,"#8a5c3b"],
  [5,8,2,2,"#8a5c3b"],[9,10,2,2,"#8a5c3b"],[4,4,2,1,"#a3ecbb"]
];
const TICKET = [
  [2,5,12,6,"#3cbf6d"],[2,5,12,1,"#7ddf9e"],[2,10,12,1,"#2b9151"],
  [7,5,1,6,"#ffffff"],[9,7,3,2,"#ffffff"],[4,7,2,2,"#ffffff"]
];
const STAR = [
  [7,2,2,3,"#ffcb45"],[7,11,2,3,"#ffcb45"],[2,7,3,2,"#ffcb45"],[11,7,3,2,"#ffcb45"],
  [5,5,6,6,"#ffcb45"],[6,6,4,4,"#ffd97a"],[7,7,2,2,"#fff3d4"]
];
const CLOUD = [
  [3,4,10,3,"#ffffff"],[4,3,8,1,"#ffffff"],[3,7,10,1,"#dfe9f4"],
  [4,9,1,2,"#3ea6f0"],[7,10,1,2,"#3ea6f0"],[10,9,1,2,"#3ea6f0"],[6,12,1,2,"#3ea6f0"],[9,13,1,2,"#3ea6f0"]
];
const ART = {
  "helm-iron": helm("#aeb8b3","#dfe6e2","#8f9a94"),
  "helm-gold": helm("#f5b83d","#ffd97a","#cf982a"),
  "helm-dia":  helm("#45c4d3","#a8ecf2","#2fa1af"),
  "helm-em":   helm("#3cbf6d","#7ddf9e","#31a75d"),
  "crown":     CROWN,
  "key-mint":  key("#3cbf6d","#8fe0af"),
  "key-gold":  key("#f5b83d","#ffd97a"),
  "key-red":   key("#e2554d","#f0928c"),
  "key-blue":  key("#3ea6f0","#9dd2f8"),
  "key-cyan":  key("#2fbfae","#8fe0d7"),
  "key-pink":  key("#ef7bb8","#f7b6d9"),
  "key-grey":  key("#93a09b","#c3ccc8"),
  "block":     BLOCK,
  "ticket":    TICKET,
  "star":      STAR,
  "cloud":     CLOUD
};
const TILES = {
  green:"linear-gradient(145deg,#d9f2e2,#b9e8cd)",
  blue:"linear-gradient(145deg,#ddeffd,#bcdff9)",
  yellow:"linear-gradient(145deg,#fff1cf,#ffe3a1)",
  purple:"linear-gradient(145deg,#ebe4fc,#d7c9f8)",
  teal:"linear-gradient(145deg,#dcf4f0,#bde8e2)",
  orange:"linear-gradient(145deg,#ffeeda,#ffdcb0)"
};
function artSvg(artKey){
  const cells = ART[artKey] || ART["key-mint"];
  const rects = cells.map(([x,y,w,h,f]) => `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${f}"/>`).join("");
  return `<svg viewBox="0 0 16 16" shape-rendering="crispEdges" aria-hidden="true">${rects}</svg>`;
}
function tileHtml(cat, it){
  return `<div class="tile" style="background:${TILES[cat.tile] || TILES.green}">${artSvg(it.art)}${it.badge ? `<span class="badge">${it.badge}</span>` : ""}</div>`;
}

/* ---------- nav (grouped like the reference: top-level + collapsible groups) ---------- */
const nav = document.getElementById("nav");
const DOTS = {green:"#3cbf6d",blue:"#3ea6f0",yellow:"#ffcb45",purple:"#977bef",teal:"#2fbfae",orange:"#ff9838"};
function buildNav(){
  const groups = [];
  const seen = {};
  groups.push({type:"link", key:"home", label:"Store Home", dot:"#3cbf6d"});
  for (const [key, cat] of Object.entries(CATALOG)){
    if (!cat.group){
      groups.push({type:"link", key, label:cat.label, dot:DOTS[cat.tile]});
    } else {
      if (!seen[cat.group]){ seen[cat.group] = {type:"group", label:cat.group, children:[]}; groups.push(seen[cat.group]); }
      seen[cat.group].children.push({key, label:cat.label, dot:DOTS[cat.tile]});
    }
  }
  nav.innerHTML = groups.map(g => {
    if (g.type === "link")
      return `<a class="nav-item" data-page="${g.key}" href="#${g.key === "home" ? "" : g.key}"><span class="dot" style="background:${g.dot}"></span>${g.label}</a>`;
    const kids = g.children.map(c =>
      `<a class="nav-item" data-page="${c.key}" href="#${c.key}"><span class="dot" style="background:${c.dot}"></span>${c.label}</a>`).join("");
    return `<div class="nav-group" data-group="${g.label}">
      <button class="nav-group-head" type="button"><span class="dot" style="background:#93a09b"></span>${g.label}<span class="caret">▾</span></button>
      <div class="nav-sub">${kids}</div></div>`;
  }).join("");
  nav.querySelectorAll(".nav-group-head").forEach(h =>
    h.addEventListener("click", () => h.parentElement.classList.toggle("open")));
}
buildNav();

/* ---------- pages ---------- */
const main = document.getElementById("main");
const checkoutLive = !!CONFIG.checkoutUrl;
const hasDiscord = !!CONFIG.discord;
const hasMail = !!CONFIG.contactEmail;
const hasContact = hasDiscord || hasMail;
function money(n){ return "$" + n.toFixed(2) + " USD"; }
function itemUrl(it){
  if (it.url) return it.url;
  if (checkoutLive && it.checkoutId) return CONFIG.checkoutUrl.replace(/\/$/,"") + "/package/" + it.checkoutId;
  return null;
}

function homePage(){
  return `
  <div class="banner">
    <h1>Welcome to the MintHaven Store!</h1>
    <p>Grab ranks, crate keys, claim blocks and more. Everything's earnable in-game too — this just helps the server, and it's <b>never pay-to-win</b>.</p>
  </div>
  <div class="card">
    <h2>Thank you 💚</h2>
    <p>Thank you for supporting <strong>MintHaven MC</strong>. Everything you buy here goes straight back into the server — hosting, plugins and new content.</p>
    ${checkoutLive ? `
    <p><strong>Delivery:</strong> packages are applied to your account automatically. If your purchase hasn't arrived within 15 minutes, relog once${hasContact ? " — still missing? Contact us and we'll fix it" : ""}.</p>
    <p><strong>Important:</strong> make sure you enter your exact Minecraft username at checkout. All purchases are final.</p>` : `
    <p><strong>Heads up:</strong> online checkout is opening soon — browse the packages now and check back shortly.</p>`}
  </div>
  ${hasContact ? `<div class="card"><div class="btn-row">
      ${hasDiscord ? `<a class="btn btn-green" href="${CONFIG.discord}" target="_blank" rel="noopener">Join our Discord</a>` : ""}
      ${hasMail ? `<a class="btn btn-ghost" href="mailto:${CONFIG.contactEmail}">Contact</a>` : ""}
  </div></div>` : ""}`;
}

function catPage(key){
  const cat = CATALOG[key];
  const title = cat.group ? `${cat.group} — ${cat.label}` : cat.label;
  return `
  <div class="cat-head"><span class="ct">${title}</span><span class="cb">${cat.blurb}</span></div>
  <div class="grid">
    ${cat.items.map(it => `
      <div class="prod">
        ${tileHtml(cat, it)}
        <div class="name">${it.name}</div>
        <div class="price">${money(it.price)}</div>
        <button class="buy" data-cat="${key}" data-id="${it.id}">Buy</button>
      </div>`).join("")}
  </div>`;
}

function render(){
  const page = (location.hash || "#").slice(1) || "home";
  const isCat = page !== "home" && Object.hasOwn(CATALOG, page);
  document.querySelectorAll(".nav-item").forEach(el =>
    el.classList.toggle("active", el.dataset.page === (isCat ? page : "home")));
  if (isCat && CATALOG[page].group){
    const g = nav.querySelector(`.nav-group[data-group="${CATALOG[page].group}"]`);
    if (g) g.classList.add("open");
  }
  main.innerHTML = isCat ? catPage(page) : homePage();
  if (isCat && window.matchMedia("(max-width:900px)").matches) main.scrollIntoView();
  else window.scrollTo({top:0});
}
window.addEventListener("hashchange", () => { closeModal(); render(); });

/* ---------- buy modal ---------- */
const modalBg = document.getElementById("modalBg");
let lastFocus = null;
function closeModal(){
  if (!modalBg.classList.contains("open")) return;
  modalBg.classList.remove("open");
  if (lastFocus) { lastFocus.focus(); lastFocus = null; }
}
main.addEventListener("click", e => {
  const b = e.target.closest(".buy");
  if (!b) return;
  const cat = CATALOG[b.dataset.cat];
  const it = cat.items.find(x => x.id === b.dataset.id);
  document.getElementById("modalArtWrap").innerHTML = tileHtml(cat, it);
  document.getElementById("modalName").textContent = it.name;
  document.getElementById("modalPrice").textContent = money(it.price);
  const go = document.getElementById("modalGo");
  const msg = document.getElementById("modalMsg");
  const url = itemUrl(it);
  if (url){
    go.style.display = "inline-flex";
    go.href = url;
    msg.textContent = "You'll finish this purchase on our checkout.";
  } else {
    go.style.display = "none";
    msg.textContent = "Online checkout is opening soon. " + (hasDiscord ? "Join the Discord to get notified the moment it's live." : "Check back shortly!");
  }
  lastFocus = b;
  modalBg.classList.add("open");
  document.getElementById("modalClose").focus();
});
document.getElementById("modalClose").onclick = closeModal;
modalBg.addEventListener("click", e => { if (e.target === modalBg) closeModal(); });
window.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

/* ---------- top bar / footer ---------- */
const chip = document.getElementById("ipChip");
const toast = document.getElementById("toast");
function showToast(text){
  toast.textContent = text;
  toast.classList.add("show");
  setTimeout(() => { toast.classList.remove("show"); toast.textContent = ""; }, 2200);
}
if (CONFIG.serverIp){
  document.getElementById("ipText").textContent = CONFIG.serverIp.toUpperCase();
  document.getElementById("ipHint").textContent = "· copy";
  chip.title = "Copy server IP";
  chip.onclick = () => {
    navigator.clipboard.writeText(CONFIG.serverIp)
      .then(() => showToast("Server IP copied!"))
      .catch(() => showToast("Copy failed — IP: " + CONFIG.serverIp));
  };
} else {
  chip.classList.add("dead");
  chip.disabled = true;
  document.getElementById("ipText").textContent = "Server address coming soon";
}
const dTop = document.getElementById("discordTop");
if (hasDiscord){ dTop.style.display = "flex"; dTop.href = CONFIG.discord; }
document.getElementById("sideHelp").textContent = hasContact
  ? "Questions about a purchase? Reach us and we'll sort it fast."
  : "Support contact details are coming soon.";
document.getElementById("footNote").textContent = checkoutLive
  ? "Payments are processed securely; packages are delivered in game."
  : "Every purchase supports the server.";
document.getElementById("year").textContent = new Date().getFullYear();

render();
</script>
</body>
</html>
