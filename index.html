<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MintHaven Store</title>
<meta name="description" content="MintHaven MC official store — ranks, crate keys, claim blocks and more. Support the server, never pay-to-win.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --night0:#070d17;
  --night1:#0c1524;
  --panel:#152435;
  --panel-2:#1b2d42;
  --slot:#0d1826;
  --edge:#060b12;
  --hi:rgba(255,255,255,.08);
  --lo:rgba(0,0,0,.45);
  --mint:#4ade9b;
  --mint-2:#35bd80;
  --mint-deep:#1d7a4e;
  --mint-glow:rgba(74,222,155,.45);
  --gold:#ffd167;
  --text:#e7f5ec;
  --muted:#a7bfb2;
  --px:"Press Start 2P",monospace;
  --body:"Nunito",system-ui,sans-serif;
  --oct:polygon(0 8px,8px 0,calc(100% - 8px) 0,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0 calc(100% - 8px));
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--night0)}
body{
  font-family:var(--body);font-size:15px;color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  background:
    radial-gradient(900px 500px at 15% -80px, rgba(74,222,155,.08), transparent 60%),
    linear-gradient(180deg, rgba(7,13,23,.86) 0%, rgba(7,13,23,.93) 45%, rgba(7,13,23,.985) 100%),
    url("assets/bg-night.jpg") center top / cover fixed,
    var(--night0);
  position:relative;
}
/* pixel star field */
body::before,body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-repeat:repeat;
}
body::before{
  background-image:
    radial-gradient(2px 2px at 20px 30px,rgba(255,255,255,.55) 50%,transparent 51%),
    radial-gradient(2px 2px at 130px 90px,rgba(255,255,255,.35) 50%,transparent 51%),
    radial-gradient(2px 2px at 220px 40px,rgba(160,255,210,.5) 50%,transparent 51%),
    radial-gradient(2px 2px at 300px 130px,rgba(255,255,255,.3) 50%,transparent 51%),
    radial-gradient(2px 2px at 70px 160px,rgba(160,255,210,.35) 50%,transparent 51%);
  background-size:340px 200px;
  animation:twinkle 4s steps(2) infinite;
}
body::after{
  background-image:
    radial-gradient(2px 2px at 60px 60px,rgba(255,255,255,.4) 50%,transparent 51%),
    radial-gradient(2px 2px at 180px 20px,rgba(255,209,103,.5) 50%,transparent 51%),
    radial-gradient(2px 2px at 260px 110px,rgba(255,255,255,.3) 50%,transparent 51%);
  background-size:300px 170px;
  animation:twinkle 5s steps(2) 1.6s infinite;
}
@keyframes twinkle{0%,100%{opacity:1}50%{opacity:.35}}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img,svg{display:block}
.px{font-family:var(--px);letter-spacing:0}

/* ---------- game panel bevel ---------- */
.panel{
  background:var(--panel);
  border:2px solid var(--edge);
  clip-path:var(--oct);
  box-shadow:inset 0 3px 0 var(--hi), inset 0 -3px 0 var(--lo), inset 3px 0 0 rgba(255,255,255,.03), inset -3px 0 0 rgba(0,0,0,.25);
}

/* ---------- top bar ---------- */
.topbar{
  background:#0a1420;
  border-bottom:2px solid var(--edge);
  position:sticky;top:0;z-index:50;
}
.topbar::after{
  content:"";display:block;height:5px;
  background:repeating-linear-gradient(90deg,#35bd80 0 14px,#2fae74 14px 28px,#4ade9b 28px 42px,#2b9c69 42px 56px);
  box-shadow:0 2px 8px rgba(74,222,155,.35);
}
.topbar-inner{
  max-width:1150px;margin:0 auto;padding:0 16px;
  height:58px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;
}
.brand{grid-column:1;display:inline-flex;align-items:center;gap:10px;font-family:var(--px);font-size:13px;color:var(--mint);text-shadow:0 0 12px var(--mint-glow)}
.brand svg{width:26px;height:26px;image-rendering:pixelated;filter:drop-shadow(0 0 6px var(--mint-glow))}
.ip-chip{
  grid-column:2;display:flex;align-items:center;gap:9px;
  background:#12213296;border:2px solid #23394f;
  clip-path:var(--oct);
  padding:9px 16px;color:var(--mint);
  font-family:var(--px);font-size:13px;
  transition:transform .1s;
}
.ip-chip.dead{color:var(--muted)}
.ip-chip span{white-space:nowrap}
.ip-chip:not(.dead){box-shadow:0 0 14px rgba(74,222,155,.15)}
.ip-chip:active{transform:scale(.98)}
.ip-chip .hint{font-family:var(--body);color:var(--muted);font-weight:700;font-size:13px}
.top-right{grid-column:3;justify-self:end;display:flex;align-items:center;gap:10px}
.top-btn{
  display:flex;align-items:center;
  background:var(--panel-2);border:2px solid #23394f;clip-path:var(--oct);
  padding:8px 14px;font-size:13px;font-weight:800;color:var(--text);
}
.currency{font-family:var(--px);font-size:13px;color:var(--gold);padding:8px 2px;text-shadow:0 0 10px rgba(255,209,103,.35);white-space:nowrap}

/* ---------- layout ---------- */
.wrap{
  width:100%;max-width:1150px;margin:24px auto 56px;padding:0 16px;
  display:grid;grid-template-columns:280px 1fr;gap:22px;
  align-items:start;flex:1;position:relative;z-index:1;
}

/* ---------- sidebar ---------- */
.side{display:flex;flex-direction:column;gap:16px;position:sticky;top:86px}
.logo-card{padding:24px 14px 20px;text-align:center;position:relative;overflow:hidden}
.logo-card::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(220px 120px at 50% -20px, rgba(74,222,155,.18), transparent 70%);
  pointer-events:none;
}
.logo-card svg{width:88px;height:88px;margin:0 auto 12px;image-rendering:pixelated;filter:drop-shadow(0 4px 14px var(--mint-glow));animation:bob 4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.logo-name{font-family:var(--px);font-size:15px;color:var(--mint);text-shadow:0 0 14px var(--mint-glow)}
.logo-sub{font-size:13px;color:var(--muted);margin-top:9px;font-weight:700}
.nav-card{padding:8px}
.nav-item{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:12px 13px;margin:3px 0;color:var(--muted);
  background:var(--slot);border:2px solid #1c2c3f;clip-path:var(--oct);
  font-family:var(--px);font-size:13px;
  box-shadow:inset 0 2px 0 rgba(0,0,0,.4);
  transition:color .12s,border-color .12s,box-shadow .12s;
}
.nav-item.active{
  color:#0b1a12;background:linear-gradient(180deg,#5fe08a,var(--mint-2));
  border-color:var(--mint-deep);
  box-shadow:inset 0 3px 0 rgba(255,255,255,.35), inset 0 -3px 0 rgba(0,0,0,.25), 0 0 16px var(--mint-glow);
}
.nav-item .dot{width:10px;height:10px;flex:none;box-shadow:0 0 8px currentColor}
.nav-item.active .dot{background:#0b1a12!important;box-shadow:none}
.nav-group-head{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:12px 13px;margin:3px 0;color:var(--text);
  font-family:var(--px);font-size:13px;
}
.nav-group-head .caret{margin-left:auto;transition:transform .15s;color:var(--muted);font-size:13px}
.nav-group.open .caret{transform:rotate(180deg)}
.nav-sub{display:none;padding-left:12px}
.nav-group.open .nav-sub{display:block}
.side-note{padding:18px;text-align:center}
.side-note .t{font-family:var(--px);font-size:13px;color:var(--gold);margin-bottom:9px;text-shadow:0 0 10px rgba(255,209,103,.3)}
.side-note p{font-size:13px;color:var(--muted);font-weight:700;line-height:1.55}

/* ---------- hero ---------- */
.main{display:flex;flex-direction:column;gap:18px;min-width:0;scroll-margin-top:80px}
.hero{
  position:relative;overflow:hidden;
  border:2px solid var(--edge);clip-path:var(--oct);
  background:
    linear-gradient(90deg, rgba(7,16,20,.94) 0%, rgba(7,16,20,.82) 34%, rgba(7,16,20,.30) 66%, rgba(7,16,20,.12) 100%),
    linear-gradient(0deg, rgba(7,13,23,.55) 0%, transparent 30%),
    url("assets/hero.jpg") right 28% / cover;
  padding:38px 30px 46px;min-height:280px;
  box-shadow:inset 0 3px 0 rgba(255,255,255,.06), inset 0 -3px 0 rgba(0,0,0,.35);
}
.spark{position:absolute;width:10px;height:10px;pointer-events:none;
  background:
    linear-gradient(transparent 40%, currentColor 40% 60%, transparent 60%),
    linear-gradient(90deg,transparent 40%, currentColor 40% 60%, transparent 60%);
  animation:twinkle 2.6s steps(2) infinite;
}
.hero h1{font-family:var(--px);font-size:22px;line-height:1.5;color:#fff;max-width:440px;position:relative;text-shadow:0 3px 0 rgba(0,0,0,.45), 0 0 22px rgba(74,222,155,.35)}
.hero h1 .mintword{color:var(--mint)}
.hero p{position:relative;margin-top:14px;font-weight:700;font-size:15px;color:#eafff3;max-width:430px;line-height:1.6;text-shadow:0 2px 0 rgba(0,0,0,.35)}
.hero p b{color:var(--gold)}

/* ---------- cards ---------- */
.card{padding:22px}
.card h2{font-family:var(--px);font-size:15px;color:var(--mint);margin-bottom:12px;text-shadow:0 0 12px var(--mint-glow)}
.card p{font-size:15px;line-height:1.65;color:var(--muted);font-weight:600}
.card p + p{margin-top:11px}
.card p strong{color:var(--text)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 22px;clip-path:var(--oct);
  font-family:var(--px);font-size:13px;
  transition:filter .12s, transform .1s;
}
.btn-green{
  background:linear-gradient(180deg,#54d684,#2fa768);color:#08150e;
  border:2px solid var(--mint-deep);
  box-shadow:inset 0 3px 0 rgba(255,255,255,.35), inset 0 -4px 0 rgba(0,0,0,.3), 0 0 16px rgba(74,222,155,.25);
}
.btn-green:active{transform:translateY(2px)}
.btn-ghost{background:var(--panel-2);color:var(--text);border:2px solid #23394f}

/* ---------- category grid ---------- */
.cat-head{
  padding:16px 20px;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.cat-head .ct{font-family:var(--px);font-size:15px;color:var(--text);text-shadow:0 0 12px rgba(74,222,155,.25)}
.cat-head .cb{font-size:13px;color:var(--muted);font-weight:700}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.prod{
  padding:12px 12px 14px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:transform .15s;position:relative;
}
.tile{
  width:100%;height:112px;position:relative;margin-bottom:9px;
  background:var(--slot);
  border:2px solid var(--tile-c, var(--mint));
  clip-path:var(--oct);
  box-shadow:inset 0 4px 0 rgba(0,0,0,.5), inset 0 0 26px var(--tile-g, rgba(74,222,155,.12));
  display:flex;align-items:center;justify-content:center;
}
.tile svg{width:70px;height:70px;image-rendering:pixelated;filter:drop-shadow(0 0 8px var(--tile-g, rgba(74,222,155,.35)))}
.badge{
  position:absolute;right:8px;top:8px;
  background:#0a1420;color:var(--gold);border:2px solid #23394f;
  font-family:var(--px);font-size:13px;padding:3px 7px;
}
.prod .name{font-size:15px;font-weight:800;color:var(--text);line-height:1.3}
.prod .price{font-family:var(--px);font-size:13px;color:var(--gold);margin:4px 0 10px;text-shadow:0 0 10px rgba(255,209,103,.3)}
.prod .buy{
  width:100%;max-width:170px;min-height:44px;
  background:linear-gradient(180deg,#54d684,#2fa768);color:#08150e;
  border:2px solid var(--mint-deep);clip-path:var(--oct);
  font-family:var(--px);font-size:13px;
  box-shadow:inset 0 3px 0 rgba(255,255,255,.35), inset 0 -4px 0 rgba(0,0,0,.3);
  transition:filter .12s, transform .1s, box-shadow .15s;
}
.prod .buy:active{transform:translateY(2px)}

@media(hover:hover){
  .ip-chip:not(.dead):hover{border-color:var(--mint)}
  .top-btn:hover{border-color:var(--mint)}
  .nav-item:not(.active):hover{color:var(--text);border-color:#2f4763}
  .btn-green:hover,.prod .buy:hover{filter:brightness(1.1)}
  .btn-ghost:hover{border-color:var(--mint)}
  .prod:hover{transform:translateY(-4px)}
  .prod:hover .tile{box-shadow:inset 0 4px 0 rgba(0,0,0,.5), inset 0 0 34px var(--tile-g, rgba(74,222,155,.2)), 0 0 22px var(--tile-g, rgba(74,222,155,.25))}
}

/* ---------- footer ---------- */
footer{
  border-top:2px solid var(--edge);margin-top:auto;position:relative;z-index:1;
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.02) 0 8px, transparent 8px 16px),
    #0a1420;
}
footer::before{
  content:"";display:block;height:5px;
  background:repeating-linear-gradient(90deg,#2b3d52 0 14px,#22334a 14px 28px,#31465e 28px 42px);
}
.foot-inner{
  max-width:1150px;margin:0 auto;padding:26px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
}
.foot-brand{display:inline-flex;align-items:center;gap:9px;font-family:var(--px);font-size:13px;color:var(--mint)}
.foot-brand svg{width:20px;height:20px;image-rendering:pixelated}
.foot-inner .fb{font-size:13px;color:var(--muted);font-weight:600;line-height:1.6}
.ptw{font-size:13px;font-weight:800;color:var(--mint);margin-top:6px;text-shadow:0 0 10px rgba(74,222,155,.25)}

/* ---------- modal ---------- */
.modal-bg{
  position:fixed;inset:0;background:rgba(4,9,16,.75);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--panel);border:2px solid var(--mint-deep);clip-path:var(--oct);
  box-shadow:inset 0 3px 0 var(--hi), inset 0 -3px 0 var(--lo), 0 0 40px rgba(74,222,155,.2);
  max-width:430px;width:100%;padding:26px;text-align:center;
}
.modal .tile{height:120px;max-width:200px;margin:0 auto 10px}
.modal h3{font-family:var(--px);font-size:15px;color:var(--mint);margin-bottom:8px;line-height:1.5}
.modal .mp{font-size:15px;color:var(--muted);font-weight:600;line-height:1.6;margin:10px 0 18px}
.modal .price-line{font-family:var(--px);font-size:15px;color:var(--gold);text-shadow:0 0 10px rgba(255,209,103,.3)}
.modal .btn + .btn{margin-left:8px}

/* ---------- toast (advancement style) ---------- */
.toast{
  position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-160px);
  background:#0a1420;color:var(--gold);border:2px solid var(--gold);clip-path:var(--oct);
  font-family:var(--px);font-size:13px;
  padding:13px 20px;z-index:120;
  transition:transform .25s ease;box-shadow:0 0 24px rgba(255,209,103,.25);
  visibility:hidden;
}
.toast.show{transform:translateX(-50%) translateY(0);visibility:visible}

/* ---------- responsive ---------- */
@media(max-width:900px){
  .wrap{display:flex;flex-direction:column;gap:16px;align-items:stretch}
  .side{display:contents}
  .logo-card{order:0}
  .nav-card{order:1}
  .main{order:2}
  .side-note{order:3}
  .topbar-inner{display:flex;justify-content:space-between;height:58px;padding:0 12px}
  .brand span{display:none}
  .ip-chip .hint{display:none}
  .grid{grid-template-columns:repeat(2,1fr)}
  .hero{background:
    linear-gradient(90deg, rgba(7,16,20,.93) 0%, rgba(7,16,20,.84) 46%, rgba(7,16,20,.45) 100%),
    linear-gradient(0deg, rgba(7,13,23,.55) 0%, transparent 30%),
    url("assets/hero.jpg") right 30% / cover}
  .hero h1{font-size:17px;position:relative;z-index:1}
  .hero p{z-index:1}
}
@media(max-width:520px){
  .grid{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){
  .cloud,.logo-card svg,.hero .island,body::before,body::after,.spark{animation:none}
}
</style>
</head>

<script>
/* ---------- pixel sprite renderer ---------- */
const SLOT = "#0a1220";
function helm(A,B,C){ return [
  [4,3,8,1,B],[3,4,10,3,A],[5,7,6,2,SLOT],
  [3,7,2,4,A],[11,7,2,4,A],[12,4,1,3,C],[3,10,2,1,C],[11,10,2,1,C]
];}
function key(K,L){ return [
  [4,2,4,1,K],[3,3,1,4,K],[7,3,1,4,K],[4,6,4,1,K],
  [5,7,2,6,K],[7,9,2,1,K],[7,12,2,1,K],[4,2,2,1,L]
];}
const CROWN = [
  [3,10,10,3,"#ffd167"],[3,5,2,5,"#ffd167"],[7,4,2,6,"#ffd167"],[11,5,2,5,"#ffd167"],
  [4,11,2,1,"#4ade9b"],[7,11,2,1,"#ff6b61"],[10,11,2,1,"#5bb8ff"],[3,10,10,1,"#ffe49d"]
];
const BLOCK = [
  [3,3,10,3,"#4fca77"],[3,3,10,1,"#8fe0af"],
  [3,6,10,7,"#a9744f"],[3,6,10,1,"#8a5c3b"],
  [5,8,2,2,"#8a5c3b"],[9,10,2,2,"#8a5c3b"],[4,4,2,1,"#b6f0cb"]
];
const TICKET = [
  [2,5,12,6,"#4ade9b"],[2,5,12,1,"#8fe0af"],[2,10,12,1,"#1d7a4e"],
  [7,5,1,6,"#0d1826"],[9,7,3,2,"#0d1826"],[4,7,2,2,"#0d1826"]
];
const STAR = [
  [7,2,2,3,"#ffd167"],[7,11,2,3,"#ffd167"],[2,7,3,2,"#ffd167"],[11,7,3,2,"#ffd167"],
  [5,5,6,6,"#ffd167"],[6,6,4,4,"#ffe49d"],[7,7,2,2,"#fff4d6"]
];
const CLOUD = [
  [3,4,10,3,"#eef4fb"],[4,3,8,1,"#ffffff"],[3,7,10,1,"#9fb4cc"],
  [4,9,1,2,"#5bb8ff"],[7,10,1,2,"#5bb8ff"],[10,9,1,2,"#5bb8ff"],[6,12,1,2,"#5bb8ff"],[9,13,1,2,"#5bb8ff"]
];
const ART = {
  "helm-iron": helm("#c3cdc8","#ecf2ef","#93a09b"),
  "helm-gold": helm("#ffd167","#ffe49d","#cf982a"),
  "helm-dia":  helm("#57d4e0","#a8ecf2","#3aa8b5"),
  "helm-em":   helm("#4ade9b","#8fe0af","#2fae74"),
  "crown":     CROWN,
  "key-mint":  key("#4ade9b","#a5ecc9"),
  "key-gold":  key("#ffd167","#ffe49d"),
  "key-red":   key("#ff6b61","#ffa39c"),
  "key-blue":  key("#5bb8ff","#a6d8ff"),
  "key-cyan":  key("#3ed3c0","#9fe8de"),
  "key-pink":  key("#ff7bc2","#ffb6dd"),
  "key-grey":  key("#aab6b1","#d3dcd8"),
  "block":     BLOCK,
  "ticket":    TICKET,
  "star":      STAR,
  "cloud":     CLOUD
};
/* rarity glow per category tile key */
const TILES = {
  gold:   ["#ffd167","rgba(255,209,103,.35)"],
  blue:   ["#5bb8ff","rgba(91,184,255,.35)"],
  orange: ["#ffb054","rgba(255,176,84,.35)"],
  purple: ["#c89bff","rgba(200,155,255,.35)"],
  teal:   ["#3ed3c0","rgba(62,211,192,.35)"],
  green:  ["#4ade9b","rgba(74,222,155,.35)"]
};
function artSvg(artKey){
  const cells = ART[artKey] || ART["key-mint"];
  const rects = cells.map(([x,y,w,h,f]) => `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${f}"/>`).join("");
  return `<svg viewBox="0 0 16 16" shape-rendering="crispEdges" aria-hidden="true">${rects}</svg>`;
}
function tileHtml(cat, it){
  const [c, g] = TILES[cat.tile] || TILES.green;
  return `<div class="tile" style="--tile-c:${c};--tile-g:${g}">${artSvg(it.art)}${it.badge ? `<span class="badge">${it.badge}</span>` : ""}</div>`;
}

/* ---------- nav (grouped like the reference: top-level + collapsible groups) ---------- */
const nav = document.getElementById("nav");
function buildNav(){
  const groups = [];
  const seen = {};
  groups.push({type:"link", key:"home", label:"Store Home", dot:"#4ade9b"});
  for (const [key, cat] of Object.entries(CATALOG)){
    const dot = (TILES[cat.tile] || TILES.green)[0];
    if (!cat.group){
      groups.push({type:"link", key, label:cat.label, dot});
    } else {
      if (!seen[cat.group]){ seen[cat.group] = {type:"group", label:cat.group, children:[]}; groups.push(seen[cat.group]); }
      seen[cat.group].children.push({key, label:cat.label, dot});
    }
  }
  nav.innerHTML = groups.map(g => {
    if (g.type === "link")
      return `<a class="nav-item" data-page="${g.key}" href="#${g.key === "home" ? "" : g.key}"><span class="dot" style="background:${g.dot};color:${g.dot}"></span>${g.label}</a>`;
    const kids = g.children.map(c =>
      `<a class="nav-item" data-page="${c.key}" href="#${c.key}"><span class="dot" style="background:${c.dot};color:${c.dot}"></span>${c.label}</a>`).join("");
    return `<div class="nav-group" data-group="${g.label}">
      <button class="nav-group-head" type="button" aria-expanded="false"><span class="dot" style="background:#5a748c;color:#5a748c"></span>${g.label}<span class="caret">▾</span></button>
      <div class="nav-sub">${kids}</div></div>`;
  }).join("");
  nav.querySelectorAll(".nav-group-head").forEach(h =>
    h.addEventListener("click", () => {
      h.parentElement.classList.toggle("open");
      h.setAttribute("aria-expanded", h.parentElement.classList.contains("open"));
    }));
}
buildNav();

/* ---------- pages ---------- */
const main = document.getElementById("main");
const checkoutLive = !!CONFIG.checkoutUrl;
const hasDiscord = !!CONFIG.discord;
const hasMail = !!CONFIG.contactEmail;
const hasContact = hasDiscord || hasMail;
function money(n){ return "$" + n.toFixed(2) + " USD"; }
function itemUrl(it){
  if (it.url) return it.url;
  if (checkoutLive && it.checkoutId) return CONFIG.checkoutUrl.replace(/\/$/,"") + "/package/" + it.checkoutId;
  return null;
}

function homePage(){
  return `
  <div class="hero">
    <span class="spark" style="top:34px;left:44%;color:#8fe0af"></span>
    <span class="spark" style="top:130px;left:52%;color:#ffd167;animation-delay:.9s"></span>
    <span class="spark" style="top:64px;left:24%;color:#a6d8ff;animation-delay:1.7s"></span>
    <h1>Welcome to <span class="mintword">MINTHAVEN</span></h1>
    <p>Grab ranks, crate keys, claim blocks and more. Everything's earnable in-game too — this just helps the server, and it's <b>never pay-to-win</b>.</p>
  </div>
  <div class="card panel">
    <h2>Thank you 💚</h2>
    <p>Thank you for supporting <strong>MintHaven MC</strong>. Everything you buy here goes straight back into the server — hosting, plugins and new content.</p>
    ${checkoutLive ? `
    <p><strong>Delivery:</strong> packages are applied to your account automatically. If your purchase hasn't arrived within 15 minutes, relog once${hasContact ? " — still missing? Contact us and we'll fix it" : ""}.</p>
    <p><strong>Important:</strong> make sure you enter your exact Minecraft username at checkout. All purchases are final.</p>` : `
    <p><strong>Heads up:</strong> online checkout is opening soon — browse the packages now and check back shortly.</p>`}
  </div>
  ${hasContact ? `<div class="card panel"><div class="btn-row">
      ${hasDiscord ? `<a class="btn btn-green" href="${CONFIG.discord}" target="_blank" rel="noopener">Join our Discord</a>` : ""}
      ${hasMail ? `<a class="btn btn-ghost" href="mailto:${CONFIG.contactEmail}">Contact</a>` : ""}
  </div></div>` : ""}`;
}

function catPage(key){
  const cat = CATALOG[key];
  const title = cat.group ? `${cat.group} — ${cat.label}` : cat.label;
  return `
  <div class="cat-head panel"><span class="ct">${title}</span><span class="cb">${cat.blurb}</span></div>
  <div class="grid">
    ${cat.items.map(it => `
      <div class="prod panel">
        ${tileHtml(cat, it)}
        <div class="name">${it.name}</div>
        <div class="price">${money(it.price)}</div>
        <button class="buy" data-cat="${key}" data-id="${it.id}" aria-label="Buy ${it.name} — ${money(it.price)}">Buy</button>
      </div>`).join("")}
  </div>`;
}

function render(){
  const page = (location.hash || "#").slice(1) || "home";
  const isCat = page !== "home" && !!CATALOG[page];
  document.querySelectorAll(".nav-item").forEach(el =>
    el.classList.toggle("active", el.dataset.page === (isCat ? page : "home")));
  if (isCat && CATALOG[page].group){
    const g = nav.querySelector(`.nav-group[data-group="${CATALOG[page].group}"]`);
    if (g){ g.classList.add("open"); g.querySelector(".nav-group-head").setAttribute("aria-expanded","true"); }
  }
  main.innerHTML = isCat ? catPage(page) : homePage();
  if (isCat && window.matchMedia("(max-width:900px)").matches) main.scrollIntoView();
  else window.scrollTo({top:0});
}
window.addEventListener("hashchange", () => { closeModal(); render(); });

/* ---------- buy modal ---------- */
const modalBg = document.getElementById("modalBg");
let lastFocus = null;
function closeModal(){
  if (!modalBg.classList.contains("open")) return;
  modalBg.classList.remove("open");
  if (lastFocus) { lastFocus.focus(); lastFocus = null; }
}
main.addEventListener("click", e => {
  const b = e.target.closest(".buy");
  if (!b) return;
  const cat = CATALOG[b.dataset.cat];
  const it = cat.items.find(x => x.id === b.dataset.id);
  document.getElementById("modalArtWrap").innerHTML = tileHtml(cat, it);
  document.getElementById("modalName").textContent = it.name;
  document.getElementById("modalPrice").textContent = money(it.price);
  const go = document.getElementById("modalGo");
  const msg = document.getElementById("modalMsg");
  const url = itemUrl(it);
  if (url){
    go.style.display = "inline-flex";
    go.href = url;
    msg.textContent = "You'll finish this purchase on our checkout.";
  } else {
    go.style.display = "none";
    msg.textContent = "Online checkout is opening soon. " + (hasDiscord ? "Join the Discord to get notified the moment it's live." : "Check back shortly!");
  }
  lastFocus = b;
  modalBg.classList.add("open");
  document.getElementById("modalClose").focus();
});
document.getElementById("modalClose").onclick = closeModal;
modalBg.addEventListener("click", e => { if (e.target === modalBg) closeModal(); });
window.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
  if (e.key === "Tab" && modalBg.classList.contains("open")){
    const focusables = [document.getElementById("modalGo"), document.getElementById("modalClose")]
      .filter(el => el.style.display !== "none");
    const first = focusables[0], last = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
    else if (!focusables.includes(document.activeElement)){ e.preventDefault(); first.focus(); }
  }
});

/* ---------- top bar / footer ---------- */
const chip = document.getElementById("ipChip");
const toast = document.getElementById("toast");
function showToast(text){
  toast.textContent = text;
  toast.classList.add("show");
  setTimeout(() => { toast.classList.remove("show"); toast.textContent = ""; }, 2200);
}
if (CONFIG.serverIp){
  document.getElementById("ipText").textContent = CONFIG.serverIp.toUpperCase();
  document.getElementById("ipHint").textContent = "· copy";
  chip.title = "Copy server IP";
  chip.onclick = () => {
    navigator.clipboard.writeText(CONFIG.serverIp)
      .then(() => showToast("Server IP copied!"))
      .catch(() => showToast("Copy failed — IP: " + CONFIG.serverIp));
  };
} else {
  chip.classList.add("dead");
  chip.disabled = true;
  document.getElementById("ipText").textContent = "COMING SOON";
}
const dTop = document.getElementById("discordTop");
if (hasDiscord){ dTop.style.display = "flex"; dTop.href = CONFIG.discord; }
document.getElementById("sideHelp").textContent = hasContact
  ? "Questions about a purchase? Reach us and we'll sort it fast."
  : "Support contact details are coming soon.";
document.getElementById("footNote").textContent = checkoutLive
  ? "Payments are processed securely; packages are delivered in game."
  : "Every purchase supports the server.";
document.getElementById("year").textContent = new Date().getFullYear();

render();
</script>
